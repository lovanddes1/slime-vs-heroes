<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>史萊姆大戰勇者 / Slime vs Heroes</title>
<style>
  :root{
    --sky-top:#8ec9e8;
    --sky-bot:#d9f0e0;
    --ground-top:#7fbf5a;
    --ground-bot:#5a9a3d;
    --wood:#a9673a;
    --wood-dark:#7a4726;
    --slime:#5fd18a;
    --slime-dark:#2e9a5c;
    --hero-body:#3f6fd6;
    --hero-skin:#f2c896;
    --ui-panel:#2b2440ee;
    --ui-accent:#f4b942;
    --ui-text:#fdf6e8;
    --danger:#e05656;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    height:100dvh;
    background:#1b1730;
    font-family:"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }
  #app{
    position:relative;
    width:100vw;height:100%;
    height:100dvh;
    display:flex;align-items:center;justify-content:center;
  }
  #stage{
    position:relative;
    /* v1.1.4: the old 900px cap left the game as a small box in the middle of
       desktop monitors - now it scales with the window, aspect preserved */
    width:min(96vw, calc(96vh * 1.8));
    aspect-ratio:900/500;
  }
  /* browser fullscreen (the menu's fullscreen button on desktop) */
  html:fullscreen #stage, html:-webkit-full-screen #stage{
    width:min(100vw, calc(100vh * 1.8));
  }
  html:fullscreen canvas, html:-webkit-full-screen canvas{
    border-radius:0;
    box-shadow:none;
  }
  html:fullscreen .overlay, html:-webkit-full-screen .overlay{
    border-radius:0;
  }
  canvas{
    position:absolute;top:0;left:0;
    width:100%;height:100%;
    display:block;
    border-radius:14px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
    touch-action:none;
  }
  /* Phones/tablets held upright: rotate the whole game so it plays in landscape
     and fills the screen, instead of shrinking to fit a portrait window. */
  @media screen and (orientation: portrait) and (pointer: coarse){
    #app{
      position:fixed;
      top:100%;left:0;
      width:100vh;height:100vw;
      width:100dvh;height:100dvw;
      transform:rotate(-90deg);
      transform-origin:left top;
    }
    #stage{
      width:min(100vh, 900px, calc(100vw * 1.8));
      width:min(100dvh, 900px, calc(100dvw * 1.8));
    }
    canvas{
      border-radius:0;
      box-shadow:none;
    }
    .overlay{ border-radius:0; }
  }
  /* Phones/tablets already in landscape (e.g. after the fullscreen landscape
     lock): fill the WHOLE screen. This stretches the fixed 900x500 stage a
     little on extra-wide screens - a fair trade against side letterbox bars
     that also caught stray taps. */
  @media screen and (orientation: landscape) and (pointer: coarse){
    #stage, html:fullscreen #stage, html:-webkit-full-screen #stage{
      width:100vw;height:100vh;
      width:100dvw;height:100dvh;
      aspect-ratio:auto;
    }
    canvas{
      border-radius:0;
      box-shadow:none;
    }
    .overlay{ border-radius:0; }
  }
  .overlay{
    position:absolute;top:0;left:0;width:100%;height:100%;
    display:flex;align-items:center;justify-content:center;
    border-radius:14px;
  }
  #menu-screen{
    position:relative;
    overflow-y:auto;
    overflow-x:hidden;
    background:#1b1440;
    flex-direction:column;
    gap:clamp(10px,2vw,22px);
    color:var(--ui-text);
    text-align:center;
    padding:4%;
  }
  #menu-bg{
    position:absolute;
    inset:0;
    z-index:-1;
    overflow:hidden;
    background:linear-gradient(180deg,#1b1440 0%,#352a63 30%,#6a4696 55%,#c97a63 78%,#f2c265 100%);
  }
  .menu-stars{
    position:absolute;inset:0;
    background-repeat:no-repeat;
  }
  .menu-stars-1{
    background-image:
      radial-gradient(1.6px 1.6px at 8% 15%, #fff 100%, transparent 100%),
      radial-gradient(1.4px 1.4px at 18% 40%, #fff 100%, transparent 100%),
      radial-gradient(1.8px 1.8px at 30% 12%, #fff 100%, transparent 100%),
      radial-gradient(1.3px 1.3px at 45% 30%, #fff 100%, transparent 100%),
      radial-gradient(1.6px 1.6px at 58% 8%, #fff 100%, transparent 100%),
      radial-gradient(1.4px 1.4px at 68% 22%, #fff 100%, transparent 100%),
      radial-gradient(2px 2px at 78% 14%, #fff 100%, transparent 100%),
      radial-gradient(1.5px 1.5px at 88% 33%, #fff 100%, transparent 100%),
      radial-gradient(1.7px 1.7px at 95% 10%, #fff 100%, transparent 100%),
      radial-gradient(1.4px 1.4px at 12% 55%, #fff 100%, transparent 100%);
    animation: menuTwinkle 3.2s ease-in-out infinite;
  }
  .menu-stars-2{
    background-image:
      radial-gradient(1.3px 1.3px at 22% 20%, #fff 100%, transparent 100%),
      radial-gradient(1.6px 1.6px at 36% 6%, #fff 100%, transparent 100%),
      radial-gradient(1.4px 1.4px at 50% 18%, #fff 100%, transparent 100%),
      radial-gradient(1.8px 1.8px at 63% 35%, #fff 100%, transparent 100%),
      radial-gradient(1.3px 1.3px at 74% 6%, #fff 100%, transparent 100%),
      radial-gradient(1.5px 1.5px at 85% 25%, #fff 100%, transparent 100%),
      radial-gradient(1.6px 1.6px at 5% 32%, #fff 100%, transparent 100%),
      radial-gradient(1.4px 1.4px at 40% 45%, #fff 100%, transparent 100%);
    animation: menuTwinkle 4s ease-in-out infinite 1.5s;
    opacity:0.8;
  }
  .menu-moon{
    position:absolute;
    top:8%;right:10%;
    width:13%;aspect-ratio:1;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fff9e0 0%, #ffe9a8 45%, #f4c563 75%, rgba(244,197,99,0) 100%);
    box-shadow:0 0 40px 10px rgba(255,230,160,0.35);
    animation: menuMoonGlow 5s ease-in-out infinite;
  }
  .menu-cloud{
    position:absolute;
    background:rgba(255,255,255,0.5);
    border-radius:50%;
    filter:blur(4px);
  }
  .menu-cloud-1{ width:18%;height:7%;top:18%;left:10%; animation: menuDriftA 22s ease-in-out infinite; opacity:0.55; }
  .menu-cloud-2{ width:14%;height:5%;top:28%;left:55%; animation: menuDriftB 26s ease-in-out infinite; opacity:0.4; }
  .menu-cloud-3{ width:10%;height:4%;top:12%;left:65%; animation: menuDriftA 18s ease-in-out infinite; opacity:0.35; }
  .menu-float-slime{
    position:absolute;
    border-radius:50% 50% 45% 45%;
    background:radial-gradient(circle at 35% 30%, #b8f5d0, #66d894 55%, #2f9d5e 100%);
  }
  .menu-float-slime-1{ width:5%;height:5%;bottom:18%;left:14%; opacity:0.5; animation: menuFloatBlob 5s ease-in-out infinite; }
  .menu-float-slime-2{ width:3.5%;height:3.5%;bottom:30%;left:82%; opacity:0.35; animation: menuFloatBlob 6.5s ease-in-out infinite 1s; }
  .menu-float-slime-3{ width:3%;height:3%;bottom:12%;left:75%; opacity:0.4; animation: menuFloatBlob 4.5s ease-in-out infinite 0.6s; }
  .menu-hills{
    position:absolute;
    bottom:0;left:0;
    width:100%;height:45%;
  }
  @keyframes menuTwinkle{
    0%,100%{ opacity:0.5; }
    50%{ opacity:1; }
  }
  @keyframes menuMoonGlow{
    0%,100%{ opacity:0.85; }
    50%{ opacity:1; }
  }
  @keyframes menuDriftA{
    0%{ transform:translateX(-5%); }
    50%{ transform:translateX(5%); }
    100%{ transform:translateX(-5%); }
  }
  @keyframes menuDriftB{
    0%{ transform:translateX(4%); }
    50%{ transform:translateX(-6%); }
    100%{ transform:translateX(4%); }
  }
  @keyframes menuFloatBlob{
    0%,100%{ transform:translateY(0) scale(1); }
    50%{ transform:translateY(-14px) scale(1.06); }
  }
  #menu-screen h1{
    font-size:clamp(20px,5vw,42px);
    margin:0 0 4px 0;
    letter-spacing:1px;
    color:var(--ui-accent);
    text-shadow:0 3px 0 rgba(0,0,0,0.4);
  }
  #menu-screen p.subtitle{
    margin:0;
    font-size:clamp(11px,1.6vw,16px);
    opacity:0.85;
  }
  .menu-slime{
    position:static;
    width:clamp(50px,10vw,90px);
    height:clamp(50px,10vw,90px);
    transform-origin:50% 88%;
    animation: menuSlimeWobble 2.6s ease-in-out infinite;
  }
  @keyframes menuSlimeWobble{
    0%,100%{ transform:scale(1,1); }
    25%{ transform:scale(1.05,0.93); }
    50%{ transform:scale(0.96,1.06); }
    75%{ transform:scale(1.03,0.96); }
  }
  .btn{
    font-family:inherit;
    font-size:clamp(14px,2.4vw,20px);
    font-weight:700;
    padding:0.7em 2em;
    border-radius:999px;
    border:none;
    cursor:pointer;
    color:#2b2440;
    background:linear-gradient(180deg,#ffe08a,var(--ui-accent));
    box-shadow:0 5px 0 #b9821f, 0 8px 14px rgba(0,0,0,0.35);
    transition:transform 0.08s ease;
  }
  .btn:active{transform:translateY(4px);box-shadow:0 1px 0 #b9821f;}
  .btn.secondary{
    background:linear-gradient(180deg,#8f8ad1,#5f58a8);
    color:var(--ui-text);
    box-shadow:0 5px 0 #423b7d, 0 8px 14px rgba(0,0,0,0.35);
    font-size:clamp(12px,1.8vw,16px);
    padding:0.5em 1.4em;
  }
  .btn.secondary:active{box-shadow:0 1px 0 #423b7d;}
  #menu-info{
    font-size:clamp(11px,1.5vw,14px);
    opacity:0.8;
    margin-top:2px;
  }
  #coin-badge{
    display:inline-flex;
    align-items:center;
    gap:0.4em;
    background:rgba(0,0,0,0.25);
    border:1px solid rgba(255,215,0,0.5);
    border-radius:999px;
    padding:0.3em 0.9em;
    font-size:clamp(12px,1.8vw,16px);
    font-weight:700;
    color:#ffe9a8;
  }
  #coin-badge svg{
    width:1.15em;height:1.15em;
    flex-shrink:0;
  }
  #lang-toggle-wrap{
    position:absolute;
    top:3%;right:4%;
  }
  #diff-toggle-wrap{
    position:absolute;
    top:3%;left:4%;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:4px;
  }
  #diff-btn{
    min-width:8.5em;
  }
  #diff-hint{
    font-size:clamp(8px,1.1vw,11px);
    opacity:0.7;
    margin:0;
    padding-left:0.4em;
  }
  #save-link-row{
    display:flex;
    gap:clamp(10px,2vw,18px);
    align-items:center;
    justify-content:center;
    white-space:nowrap;
    flex-wrap:wrap;
  }
  #save-link-row button{
    font-size:clamp(9px,1.2vw,12px);
    color:#cfc9ea;
    opacity:0.6;
    background:none;
    border:none;
    text-decoration:underline;
    cursor:pointer;
    font-family:inherit;
  }
  #save-link-row button:hover{ opacity:1; }
  #storage-warn{
    font-size:clamp(9px,1.2vw,11px);
    color:#f4b942;
    opacity:0.9;
    text-align:center;
  }
  #storage-warn.hidden{ display:none; }
  #hud{
    /* Three zones: items on the left, info + ammo fused into one top-center
       panel (the "dead zone" a thumb never touches), skills top-right. */
    position:absolute;top:0;left:0;width:100%;height:100%;
    pointer-events:none;
    box-sizing:border-box;
  }
  #hud-left-panel{
    position:absolute;
    left:2%;
    top:2.5%;
  }
  #hud-center-panel{
    position:absolute;
    left:50%;
    top:1.5%;
    transform:translateX(-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:1px;
    text-align:center;
    max-width:46%;
  }
  #hud-top-row{
    display:flex;
    gap:1.1em;
    align-items:baseline;
    justify-content:center;
    flex-wrap:wrap;
  }
  #hud-ammo-row{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    max-width:100%;
    gap:8px;
    margin-top:2px;
  }
  #hud-ammo-label{
    font-size:0.8em;
    opacity:0.85;
    white-space:nowrap;
  }
  .hud-panel{
    background:var(--ui-panel);
    color:var(--ui-text);
    border-radius:10px;
    padding:0.4em 0.9em;
    font-size:clamp(10px,1.6vw,15px);
    font-weight:600;
    line-height:1.5;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
  }
  #hud-coins{
    color:#ffe9a8;
  }
  #hud-stats{
    font-size:0.82em;
    font-weight:500;
    opacity:0.9;
    display:flex;
    flex-wrap:wrap;
    gap:0.6em;
    margin-top:2px;
    justify-content:center;
  }
  #hud-stats span{
    white-space:nowrap;
  }
  #ammo-icons{
    display:flex;
    gap:4px;
    flex-wrap:wrap;
    max-width:250px;
    justify-content:center;
  }
  .ammo-dot{
    width:clamp(8px,1.6vw,14px);height:clamp(8px,1.6vw,14px);
    border-radius:50%;
    background:var(--slime);
    border:1px solid var(--slime-dark);
  }
  .ammo-dot.used{background:#5c5470;border-color:#3a3450;}
  .ammo-count{font-size:0.85em;font-weight:bold;white-space:nowrap;}
  #esc-hint{
    position:absolute;
    bottom:2%;left:50%;transform:translateX(-50%);
    background:var(--ui-panel);
    color:var(--ui-text);
    padding:0.3em 1em;
    border-radius:999px;
    font-size:clamp(9px,1.3vw,13px);
    pointer-events:none;
    opacity:0.85;
  }
  #end-screen{
    position:absolute;top:0;left:0;width:100%;height:100%;
    background:rgba(20,16,40,0.85);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding-top:9%;
    gap:clamp(8px,1.6vw,16px);
    color:var(--ui-text);
    text-align:center;
    border-radius:14px;
    z-index:10;
  }
  #end-screen h2{
    font-size:clamp(20px,4vw,34px);
    margin:0;
    color:var(--ui-accent);
  }
  #end-screen .btn-row{
    display:flex;gap:12px;flex-wrap:wrap;justify-content:flex-start;
    align-self:flex-start;margin-left:6%;
  }
  #skill-hint{
    /* Passive status row: skills are cast by dragging anywhere on the right
       half (gesture wheel) - these badges only display remaining charges. */
    position:absolute;
    top:1.8%;
    right:2%;
    display:flex;
    gap:8px;
    align-items:center;
    pointer-events:none;
  }
  #gesture-tip{
    position:absolute;
    top:105%;
    right:0;
    font-size:clamp(9px,1.3vw,12px);
    color:rgba(255,255,255,0.75);
    white-space:nowrap;
    text-shadow:0 1px 3px rgba(0,0,0,0.6);
  }
  .skill-badge.hint-badge{
    width:clamp(34px,6.5vw,48px);
    height:clamp(34px,6.5vw,48px);
    font-size:clamp(16px,3.2vw,24px);
  }
  .skill-badge.hint-badge .skill-charge{
    min-width:16px;
    height:16px;
    font-size:11px;
    right:-4px;
    bottom:-4px;
  }
  .ult-badge.hint-badge{
    width:clamp(40px,8vw,56px);
    height:clamp(40px,8vw,56px);
    font-size:clamp(20px,4vw,28px);
  }
  #skill-hint.hidden{ display:none; }
  .skill-badge{
    position:relative;
    background:rgba(20,16,40,0.55);
    border:2.5px solid rgba(255,255,255,0.3);
    border-radius:50%;
    width:clamp(50px,10vw,74px);
    height:clamp(50px,10vw,74px);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:clamp(24px,4.8vw,34px);
    opacity:0.35;
    transition:opacity 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
  }
  .skill-badge.ready{
    opacity:1;
    box-shadow:0 0 20px 5px rgba(255,224,102,0.7);
    transform:scale(1.1);
  }
  .skill-badge.zero-flash{
    animation:zeroFlash 0.45s ease-in-out infinite;
    border-color:#eaf6ff;
  }
  @keyframes zeroFlash{
    0%, 100% { box-shadow:0 0 20px 5px rgba(143,216,255,0.85); transform:scale(1.12); }
    50% { box-shadow:0 0 34px 11px rgba(255,255,255,1); transform:scale(1.22); }
  }
  .ult-badge{
    width:clamp(66px,13vw,96px);
    height:clamp(66px,13vw,96px);
    font-size:clamp(32px,6.4vw,46px);
    opacity:1;
    border-width:3px;
  }
  .ult-badge.ult-sky{ border-color:#ffd700; animation:ultPulseGold 0.8s ease-in-out infinite; }
  .ult-badge.ult-dash{ border-color:#7cc4ff; animation:ultPulseBlue 0.8s ease-in-out infinite; }
  @keyframes ultPulseGold{
    0%,100%{ box-shadow:0 0 22px 6px rgba(255,215,0,0.75); transform:scale(1.05); }
    50%{ box-shadow:0 0 40px 14px rgba(255,240,160,0.95); transform:scale(1.16); }
  }
  @keyframes ultPulseBlue{
    0%,100%{ box-shadow:0 0 22px 6px rgba(124,196,255,0.75); transform:scale(1.05); }
    50%{ box-shadow:0 0 40px 14px rgba(200,235,255,0.95); transform:scale(1.16); }
  }
  .skill-charge{
    position:absolute;
    right:-6px;
    bottom:-6px;
    background:#f0b83d;
    color:#3a2c1a;
    border-radius:50%;
    min-width:22px;
    height:22px;
    font-size:14px;
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 3px;
    border:2px solid rgba(20,16,40,0.6);
  }
  #end-coins{
    color:#ffd700;
    font-weight:800;
    font-size:clamp(13px,2vw,18px);
    margin:-4px 0 0 0;
    text-shadow:0 2px 4px rgba(0,0,0,0.4);
  }
  #end-breakdown{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:12px;
    padding:0.6em 1em;
    width:min(84vw, 380px);
    font-size:clamp(11px,1.7vw,14px);
  }
  #end-breakdown .eb-row{
    display:flex;
    justify-content:space-between;
    gap:0.8em;
    padding:0.18em 0;
  }
  #end-breakdown .eb-label{
    opacity:0.85;
    text-align:left;
  }
  #end-breakdown .eb-value{
    font-weight:700;
    color:#a8f0c0;
    white-space:nowrap;
  }
  #end-breakdown .eb-total{
    border-top:1px solid rgba(255,255,255,0.2);
    margin-top:0.35em;
    padding-top:0.4em;
    font-weight:800;
    color:var(--ui-accent);
    font-size:1.08em;
  }
  #shop-screen{
    position:absolute;top:0;left:0;width:100%;height:100%;
    background:rgba(20,16,40,0.92);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:clamp(8px,1.4vw,14px);
    color:var(--ui-text);
    text-align:center;
    border-radius:14px;
    z-index:10;
    padding:4%;
  }
  #shop-screen h2{
    font-size:clamp(18px,3.6vw,30px);
    margin:0;
    color:var(--ui-accent);
  }
  #shop-coin-info{
    display:inline-flex;
    align-items:center;
    gap:0.4em;
    background:rgba(0,0,0,0.25);
    border:1px solid rgba(255,215,0,0.5);
    border-radius:999px;
    padding:0.3em 0.9em;
    font-size:clamp(12px,1.8vw,16px);
    font-weight:700;
    color:#ffe9a8;
  }
  #shop-coin-info svg{ width:1.15em;height:1.15em;flex-shrink:0; }
  #shop-slime-preview{
    width:clamp(46px,9vw,78px);
    height:clamp(46px,9vw,78px);
  }
  #shop-card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:14px;
    padding:0.8em 1.4em;
    min-width:min(78vw, 280px);
  }
  #shop-level-text{
    font-size:clamp(14px,2.2vw,19px);
    font-weight:800;
    margin:0 0 4px 0;
    color:var(--ui-accent);
  }
  #shop-bonus-text{
    font-size:clamp(11px,1.6vw,14px);
    opacity:0.85;
    margin:0;
  }
  #shop-upgrade-btn:disabled{
    opacity:0.45;
    cursor:not-allowed;
    filter:grayscale(0.3);
  }
  #shop-upgrade-btn:disabled:active{ transform:none; box-shadow:0 5px 0 #b9821f, 0 8px 14px rgba(0,0,0,0.35); }
  #shop-item-list{
    width:100%;
    max-width:520px;

function renderVersionList(){
  versionListEl.innerHTML = "";
  for(const entry of CHANGELOG){
    const div = document.createElement("div");
    div.className = "version-entry";
    const h = document.createElement("h3");
    h.textContent = "v" + entry.ver;
    div.appendChild(h);
    const ul = document.createElement("ul");
    for(const line of (entry[lang] || entry.zh)){
      const li = document.createElement("li");
      li.textContent = line;
      ul.appendChild(li);
    }
    div.appendChild(ul);
    versionListEl.appendChild(div);
  }
}
// ===== Chiptune audio engine =====
// Zero assets: every sound and every world theme is synthesized live with
// the Web Audio API, so the whole soundtrack costs kilobytes of text.
// Master -> music / sfx gain buses; both toggles persist in the save.
let audioCtx = null, masterGain = null, musicGain = null, sfxGain = null;
let audioUnlocked = false;
let noiseBuf = null;
let musicTimer = null;
const music = { trackId: null, boss: false, step: 0, nextTime: 0 };
function initAudio(){
  if(audioCtx) return true;
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return false;
    audioCtx = new AC();
    masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
    musicGain = audioCtx.createGain(); musicGain.connect(masterGain);
    sfxGain = audioCtx.createGain(); sfxGain.connect(masterGain);
    applyAudioSettings();
    return true;
  }catch(e){ return false; }
}
function applyAudioSettings(){
  if(!audioCtx) return;

// --- Ultimates ---
// SKYFALL (如來神掌): mid-game bouncy slimes fly off the top of the screen and
// take forever to come down. Once the slime is above the screen, a golden 🖐
// button appears: tap it to DIVE AT THE NEAREST ENEMY (v1.1.2 - a straight
// vertical plunge kept smacking empty floor) and detonate a Buddha-palm
// shockwave on the first thing you hit. With no live target it still falls
// straight down.
// BLINK STRIKE (瞬身突襲): when the slime is moving faster than a threshold, a
// blue ⚡ button appears: tap to vanish and reappear beside the nearest enemy,
// slamming through it with a guaranteed crit.
// Each ultimate can fire once per slime.
const ULT_SKY_TRIGGER_Y = -10;   // canvas y above which SKYFALL arms
const ULT_DASH_SPEED = 1350;     // speed above which BLINK STRIKE arms

let castFlashUntil = 0;
let castFlashColor = "#ffffff";
let comboPopUntil = 0;

let palmPrints = [];

function triggerHitstop(ms){

function triggerCastFlash(color, ms){

}
function registerCombo(){
  if(!slime) return;
  slime._comboCount = (slime._comboCount || 0) + 1;
  comboPopUntil = performance.now() + 600;
  if(slime._comboCount >= 2){
    comboBonusAccum += 50 * (slime._comboCount - 1);
  }
  if(slime._comboCount > levelMaxCombo) levelMaxCombo = slime._comboCount;
  if(slime._comboCount > (saveData.stats.maxCombo || 0)){
    saveData.stats.maxCombo = slime._comboCount;
    checkAchievements();
  }
}
function getAvailableUlt(){
  if(!slime || slime.state !== "flying" || slime._cloneActive) return null;
  if(!slime._ultSkyUsed && slime.y < ULT_SKY_TRIGGER_Y) return "sky";
  const spd = Math.sqrt(slime.vx*slime.vx + slime.vy*slime.vy);
  if(!slime._ultDashUsed && spd >= ULT_DASH_SPEED && heroes.some(h => h.hp > 0 && !isHeroHidden(h))) return "dash";
  return null;
}
function triggerUltimate(kind){
  if(!slime || slime.state !== "flying" || slime._cloneActive) return false;
  if(kind === "sky"){
    if(slime._ultSkyUsed) return false;
    slime._ultSkyUsed = true;
    slime._skyfallActive = true;
    // Pick the nearest living, visible enemy and hard-lock it: the per-frame
    // guidance in the flight update re-aims at slime._skyfallTarget until
    // impact (straight down only if the field is somehow empty).
    const skyTargets = heroes.filter(h => h.hp > 0 && !isHeroHidden(h));
    let diveAng = Math.PI / 2; // straight down fallback
    if(skyTargets.length){
      const cx0 = slime.x, cy0 = slime.y;
      const t = skyTargets.sort((a, b) => {
        const da = (a.x - cx0)**2 + ((a.bottom - a.h/2) - cy0)**2;
        const db = (b.x - cx0)**2 + ((b.bottom - b.h/2) - cy0)**2;
        return da - db;
      })[0];
      diveAng = Math.atan2((t.bottom - t.h/2) - cy0, t.x - cx0);
      slime._skyfallTarget = t; // hard-lock: the dive homes on this hero every frame
    }
    const DIVE_SPEED = 2600;
    slime.vx = Math.cos(diveAng) * DIVE_SPEED;
    slime.vy = Math.sin(diveAng) * DIVE_SPEED;
    slime._skyfallAngle = diveAng;
    enterZeroRealm(2, slime.x, Math.max(slime.y, 20));
    triggerCastFlash("#ffd700", 350);
    triggerHitstop(70);
    registerCombo();
    saveData.stats.ultCasts = (saveData.stats.ultCasts || 0) + 1;
    checkAchievements();
    showDemonLabelText(tr("ultSkyName"), "#ffd700");
    playSfx("ultSky");
    updateSkillHint();
    return true;
  }
  if(kind === "dash"){
    if(slime._ultDashUsed) return false;
    const targets = heroes.filter(h => h.hp > 0 && !isHeroHidden(h));
    if(targets.length === 0) return false;
    slime._ultDashUsed = true;
    const cx0 = slime.x, cy0 = slime.y;
    const target = targets.sort((a, b) => {
      const da = (a.x - cx0)**2 + ((a.bottom - a.h/2) - cy0)**2;
      const db = (b.x - cx0)**2 + ((b.bottom - b.h/2) - cy0)**2;
      return da - db;
    })[0];
    const tx = target.x, ty = target.bottom - target.h/2;
    // vanish burst at the old position...
    createImpactParticles(cx0, cy0, "#7cc4ff", 22);
    spawnShockwave(cx0, cy0, "#7cc4ff", 70, 0.3);
    // ...reappear at the enemy's side (Dragon Ball style) and slam through
    const dirX = tx >= cx0 ? 1 : -1;
    const r = getSlimeRadius();
    const gap = target.w/2 + r + 26;
    slime.x = tx - dirX * gap;
    slime.y = Math.min(ty, GROUND_Y - r - 2);
    const ang = Math.atan2(ty - slime.y, tx - slime.x);
    const SLAM = 1900;
    slime.vx = Math.cos(ang) * SLAM;
    slime.vy = Math.sin(ang) * SLAM;
    slime._guaranteedCritHits = (slime._guaranteedCritHits || 0) + 1;
    spawnDashAfterimages(cx0, cy0, slime.x, slime.y);
    spawnShockwave(slime.x, slime.y, "#bfe9ff", 90, 0.35);
    createImpactParticles(slime.x, slime.y, "#eaf6ff", 18);
    enterZeroRealm(2, slime.x, slime.y);
    triggerCastFlash("#7cc4ff", 320);
    triggerHitstop(110);
    screenShake = Math.min(screenShake + 12, 22);
    registerCombo();
    saveData.stats.ultCasts = (saveData.stats.ultCasts || 0) + 1;
    checkAchievements();
    showDemonLabelText(tr("ultDashName"), "#7cc4ff");
    playSfx("ultDash");
    updateSkillHint();
    return true;
  }
  return false;
}
function spawnDashAfterimages(x0, y0, x1, y1){
  const n = 6;
  for(let i = 0; i < n; i++){
    const f = n === 1 ? 0 : i / (n - 1);
    dashGhosts.push({
      x: x0 + (x1 - x0) * f,
      y: y0 + (y1 - y0) * f,
      r: getSlimeRadius() * (0.7 + 0.3 * f),
      born: performance.now(),
      life: 320 + i * 45
    });
  }
}
function triggerSkyfallPillars(tier){

  // single-point landing AoE with six instant, ground-anchored light
  // pillars spread around the dive's current position - wider coverage,
  // lower total damage per hit, no travel time (each pillar judges instantly).
  if(!slime) return;
  slime._skyfallActive = false;
  slime._skyfallTarget = null;
  const cx = slime.x;

  const radius = 130;

  for(let i = 0; i < 6; i++){

    skyPillars.push({ x: px, born: performance.now(), life: 480 });
    spawnShockwave(px, GROUND_Y - 10, "#ffd700", radius * 0.9, 0.4);
    createImpactParticles(px, GROUND_Y - 10, "#fff2c0", 14);
    skillAoeDamage(px, GROUND_Y - 40, radius, dmg, "#ffd700");
  }
  screenShake = Math.min(screenShake + 20, 30);
  triggerHitstop(90);
  triggerCastFlash("#ffd700", 300);
  showDemonLabelText(tr("skillPillarCast"), "#ffd700");
  playSfx("ultSkyLand");
  checkDeaths();
}

  createImpactParticles(ix, iy, "#ffffff", 20);
  palmPrints.push({ x: ix, y: iy, born: performance.now() });
  skillAoeDamage(ix, iy, radius, dmg, "#ffd700");
  screenShake = Math.min(screenShake + 26, 34);
  triggerHitstop(130);

// All four route skills are available from the very first level. Upgrading a
// route still matters: its "skill tier" (charges per shot + effect strength)
// grows with form tier, but never drops below 1.
function getSkillTier(key){
  return Math.max(1, getFormTier(key));
}
function getUnlockedSkillRoutes(){
  return SKILL_ROUTE_PRIORITY.slice();
}
function skillAoeDamage(cx, cy, radius, dmgAmount, particleColor){
  const targets = blocks.concat(heroes).filter(o => o.hp > 0 && !isHeroHidden(o));
  for(const obj of targets){
    const ox = Math.max(obj.x - obj.w/2, Math.min(cx, obj.x + obj.w/2));
    const oy = Math.max(obj.bottom - obj.h, Math.min(cy, obj.bottom));
    const dx = ox - cx, dy = oy - cy;
    if(Math.sqrt(dx*dx + dy*dy) <= radius){
      if(isDamageNullified(obj)){
        spawnShockwave(ox, oy, "#ff5a5a", 60, 0.3);
        createImpactParticles(ox, oy, "#ff5a5a", 8);
        continue;
      }
      let finalDmg = dmgAmount;
      if(obj.heroClass) finalDmg = applyFrostArmor(obj, finalDmg, ox, oy);
      if(obj.heroClass) finalDmg = adjustFinalDamage(obj, finalDmg);
      obj.hp -= finalDmg;
      createImpactParticles(ox, oy, particleColor, 10);
      if(obj.heroClass) maybeDesertBurrow(obj);
      if(obj.heroClass) applyFinalAspectOnHit(obj, ox, oy);
    }
  }
}
const BOUNCE_CHASE_RANGE = 900; // beyond this, the bounce skill ground-dives instead
function nearestVisibleHero(cx, cy){
  const alive = heroes.filter(h => h.hp > 0 && !isHeroHidden(h));
  if(alive.length === 0) return null;
  return alive.sort((a,b) => {
    const da = (a.x-cx)**2 + ((a.bottom-a.h/2)-cy)**2;
    const db = (b.x-cx)**2 + ((b.bottom-b.h/2)-cy)**2;
    return da - db;
  })[0];
}
// Directional damage for the Dead Stop shockwave: a cone along the old
// heading plus a small point-blank ring. Against a live boss barrier the
// wave damages the BARRIER instead of the boss - it is the intended breaker.
function skillConeDamage(cx, cy, dirX, dirY, range, halfAngle, dmgAmount, particleColor){
  const targets = blocks.concat(heroes).filter(o => o.hp > 0 && !isHeroHidden(o));
  const cosHalf = Math.cos(halfAngle);
  for(const obj of targets){
    const ox = Math.max(obj.x - obj.w/2, Math.min(cx, obj.x + obj.w/2));
    const oy = Math.max(obj.bottom - obj.h, Math.min(cy, obj.bottom));
    const dx = ox - cx, dy = oy - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const pointBlank = dist <= 60;
    const inCone = dist <= range && dist > 0.001 && (dx*dirX + dy*dirY) / dist >= cosHalf;
    if(!pointBlank && !inCone) continue;
    // full damage in the first 40% of the range, tapering to 35% at the tip
    let finalDmg = dmgAmount;
    if(dist > range*0.4) finalDmg *= 1 - 0.65 * ((dist - range*0.4) / (range*0.6));
    if(isDamageNullified(obj)){
      damageBarrier(obj, finalDmg, ox, oy);
      continue;
    }
    if(obj.heroClass) finalDmg = applyFrostArmor(obj, finalDmg, ox, oy);
    if(obj.heroClass) finalDmg = adjustFinalDamage(obj, finalDmg);
    obj.hp -= finalDmg;
    if(obj.heroClass) spawnFloatText(ox, oy - 12, Math.round(finalDmg), "#ffe066", finalDmg > 250);
    createImpactParticles(ox, oy, particleColor, 12);
    if(obj.heroClass) maybeDesertBurrow(obj);
    if(obj.heroClass) applyFinalAspectOnHit(obj, ox, oy);
  }
}
// --- Six-way clone volley (ammo route) ---
// The body splits into 6 clones fired every 60 degrees. Each clone deals
// HALF impact damage. Each clone resolves independently on its own hit (or
// expires on its own); the body only re-forms once every clone has landed
// its hit (or the shared timer runs out) - see stepClones().
let slimeClones = [];
let cloneVolley = null; // { timer }
function startCloneVolley(tier){
  const chaining = !!slime._cloneActive;
  const chainLevel = chaining ? (slime._cloneChainLevel || 0) + 1 : 0;
  slime._cloneChainLevel = chainLevel;
  const dmgMult = Math.pow(0.6, chainLevel); // each extra chained layer hits softer
  const spd0 = Math.sqrt(slime.vx*slime.vx + slime.vy*slime.vy);
  // Rotate the fan by a further 30° per chained layer so repeated casts
  // interleave into a denser starburst instead of stacking on the exact
  // same six rays - this is what turns a chain into a "full-screen" volley.
  const rotOffset = chainLevel * (Math.PI/3) * 0.5;
  const baseAng = (spd0 > 0.001 ? Math.atan2(slime.vy, slime.vx) : -Math.PI/4) + rotOffset;
  const spd = Math.max(spd0, 900); // works even from a slow roll
  const newClones = [];
  for(let i = 0; i < 6; i++){
    const ang = baseAng + i * Math.PI/3;
    newClones.push({
      x: slime.x, y: slime.y,
      vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
      r: getSlimeRadius() * 0.6, dead: false, dmgMult
    });
  }
  // Chaining ADDS to the swarm already in flight (older clones keep their
  // own, higher damage) rather than replacing it - that's how repeated
  // casts snowball into a full-screen bullet curtain.
  slimeClones = chaining ? slimeClones.concat(newClones) : newClones;
  cloneVolley = { timer: 1.2 };
  slime._cloneActive = true;
  slime.vx = 0; slime.vy = 0;
  createImpactParticles(slime.x, slime.y, "#8adf76", 26);
  spawnShockwave(slime.x, slime.y, "#8adf76", 80, 0.35);
}
function stepClones(dt){
  if(!cloneVolley) return;
  const targets = blocks.concat(heroes).filter(o => o.hp > 0 && !isHeroHidden(o));
  for(const c of slimeClones){
    if(c.dead) continue;
    c.vy += GRAVITY * dt;
    c.x += c.vx * dt;
    c.y += c.vy * dt;
    if(c.x - c.r < 0){ c.x = c.r; c.vx *= -0.6; }
    if(c.x + c.r > W){ c.x = W - c.r; c.vx *= -0.6; }
    if(c.y + c.r > GROUND_Y){
      c.y = GROUND_Y - c.r;
      c.vy = -Math.abs(c.vy) * 0.5;
      createImpactParticles(c.x, GROUND_Y, "#8adf76", 4);
    }
    for(const obj of targets){
      if(obj.hp <= 0) continue;
      const col = circleRectCollide(c.x, c.y, c.r, obj);
      if(!col) continue;
      const spd = Math.sqrt(c.vx*c.vx + c.vy*c.vy);
      const isHero = !!obj.heroClass;
      if(isDamageNullified(obj)){
        c.vx = -c.vx * 1.1; c.vy = -c.vy * 1.1; // barrier flings the clone back
        createImpactParticles(col.closestX, col.closestY, "#ff5a5a", 6);
        continue;
      }
      let dmg = spd * (isHero ? HERO_DMG_MULT : BLOCK_DMG_MULT) * getSlimeDamageMultiplier() * 0.5 * (c.dmgMult != null ? c.dmgMult : 1);
      if(isHero) dmg = applyFrostArmor(obj, dmg, col.closestX, col.closestY);
      if(isHero) dmg = adjustFinalDamage(obj, dmg);
      obj.hp -= dmg;
      if(isHero) spawnFloatText(col.closestX, col.closestY - 10, Math.round(dmg), "#8adf76", false);
      if(isHero) maybeDesertBurrow(obj);
      if(isHero) applyFinalAspectOnHit(obj, col.closestX, col.closestY);
      if(obj.isBoss) maybeTriggerBossRecoil(obj, col.closestX, col.closestY);
      createImpactParticles(col.closestX, col.closestY, "#8adf76", 10);
      playSfx(isHero ? "hitHero" : "hitBlock", Math.min(spd / 1500, 1) * 0.6);
      screenShake = Math.min(screenShake + 5, 18);
      c.dead = true;
      break;
    }
  }
  cloneVolley.timer -= dt;
  // Every clone resolves its OWN impact (or expires on its own) - the swarm
  // as a whole only wraps up once ALL of them have connected/expired, or the
  // shared timer runs out. This is what makes a chained CLONE STRIKE read as
  // a full volley of homing blasts landing one after another (Piccolo-vs-
  // Raditz style) instead of the whole barrage vanishing the instant the
  // very first clone happens to connect.
  if(cloneVolley.timer <= 0 || slimeClones.every(c => c.dead)){
    resolveCloneReturn();
    checkDeaths();
  }
}
function resolveCloneReturn(){
  const alive = slimeClones.filter(c => !c.dead);
  const pool = alive.length > 0 ? alive : slimeClones;
  const foes = heroes.filter(h => h.hp > 0 && !isHeroHidden(h));
  let best = pool[0], bestD = Infinity;
  for(const c of pool){
    let d;
    if(foes.length > 0){
      d = Math.min.apply(null, foes.map(h => (h.x-c.x)**2 + ((h.bottom-h.h/2)-c.y)**2));
    } else {
      d = (c.x - slime.x)**2 + (c.y - slime.y)**2;
    }
    if(d < bestD){ bestD = d; best = c; }
  }
  const r = getSlimeRadius();
  if(best){
    slime.x = Math.max(r, Math.min(best.x, W - r));
    slime.y = Math.min(best.y, GROUND_Y - r);
    slime.vx = best.vx; slime.vy = best.vy;
  }
  for(const c of slimeClones){
    if(c !== best) createImpactParticles(c.x, c.y, "#8adf76", 8);
  }
  spawnShockwave(slime.x, slime.y, "#8adf76", 70, 0.3);
  createImpactParticles(slime.x, slime.y, "#baffe0", 14);
  slimeClones = [];
  cloneVolley = null;
  slime._cloneActive = false;
  slime._cloneChainLevel = 0;
}
function drawClones(){
  if(!cloneVolley) return;
  for(const c of slimeClones){
    if(c.dead) continue;
    ctx.save();
    ctx.translate(c.x, c.y);
    const ang = Math.atan2(c.vy, c.vx);
    ctx.rotate(ang);
    ctx.fillStyle = "rgba(102,216,148,0.85)";
    ctx.beginPath();
    ctx.ellipse(0, 0, c.r*1.12, c.r*0.88, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.rotate(-ang);
    ctx.fillStyle = "#20321f";
    ctx.beginPath(); ctx.arc(-c.r*0.3, -c.r*0.15, c.r*0.16, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(c.r*0.3, -c.r*0.15, c.r*0.16, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}
// --- Zero Realm (bullet time) ---
// The first skill used after launching drops the world into "Zero Realm":
// the whole game slows to ZERO_REALM_SCALE of normal speed in real time
// (the slime's actual velocity numbers are untouched - only how much game
// time passes per real second changes), giving the player much more real
// wall-clock time to tap out several skills in a row for a combo. Stronger
// skills (higher tier) buy a longer Zero Realm window.
const ZERO_REALM_SCALE = 0.3;
const ZERO_REALM_BASE_MS = 850;
const ZERO_REALM_PER_TIER_MS = 380;
let zeroRealmUntil = 0;
let zeroRealmLabelUntil = 0;
let timeScale = 1;
function isZeroRealmActive(){
  return !!(slime && slime.state === "flying" && performance.now() < zeroRealmUntil);
}
function enterZeroRealm(tier, cx, cy){
  const durationMs = ZERO_REALM_BASE_MS + tier * ZERO_REALM_PER_TIER_MS;
  if(performance.now() >= zeroRealmUntil){
    playSfx("zero"); // whoosh only on ENTRY, not refresh
    saveData.stats.zeroRealmEntries = (saveData.stats.zeroRealmEntries || 0) + 1;
    checkAchievements();
  }
  zeroRealmUntil = performance.now() + durationMs;
  zeroRealmLabelUntil = performance.now() + 550;
  spawnShockwave(cx, cy, "#eaf6ff", 150, 0.5);
  spawnShockwave(cx, cy, "#8fd8ff", 100, 0.35);
  createImpactParticles(cx, cy, "#dff3ff", 24);
  screenShake = Math.min(screenShake + 6, 14);
}
// --- Demon Lord break-barrier ---
// Barrier bosses: every boss tier (mini-boss included) now projects a force
// barrier with its OWN health bar, drawn above their head. While it's up,
// all ordinary damage is nullified and direct hits are violently reflected.
// Only two things hurt the barrier:
//   - the crit route's stop-shockwave (full damage) - the intended breaker
//   - a direct body slam (25% of the impact speed as barrier damage)
// Barrier HP persists across shots. Once broken it stays down for the rest
// of the level - except demon lords at higher stages (and the final boss),
// which re-weave a weaker barrier one or more times. See getBarrierRegens().
let demonShieldBroken = true;  // true = the current barrier boss is damageable
let demonLabelText = "";
let demonLabelColor = "#ff5a5a";
let demonLabelUntil = 0;
function showDemonLabelText(text, color){
  demonLabelText = text;
  demonLabelColor = color;
  demonLabelUntil = performance.now() + 950;
}
function showDemonLabel(textKey, color){
  showDemonLabelText(tr(textKey), color);
}
function getLivingDemon(){
  // "Barrier boss": mini-bosses, demon lords, archons and the final boss all
  // project a reflect barrier that must be broken with skill sequences (the
  // mini-boss's is just lighter and single-use).
  for(const h of heroes){ if(h.isBoss && h.hp > 0) return h; }
  return null;
}
function isDemonShieldActive(){
  const d = getLivingDemon();
  return !!(d && d._barrierHp > 0);
}
function isDamageNullified(obj){
  return !!(obj.isBoss && obj.hp > 0 && obj._barrierHp > 0);
}
function getDemonBarrierBaseHp(demon){
  if(demon.isFinal) return 1100;
  if(demon.isGod) return 900;
  if(demon.isDemon){
    const stage = Math.floor((levelIndex + 1) / 20);
    return 250 + stage * 150; // level 20 -> 400, 40 -> 550, 60 -> 700...
  }
  // Plain mini-boss (every 5 levels): a lighter barrier - still forces a
  // real skill hit to open it up, but breaks in one clean shot rather than
  // dragging out a whole demon-lord-style siege.
  const stage = Math.floor((levelIndex + 1) / 5);
  return Math.min(70 + stage * 14, 260);
}
function getBarrierRegens(demon){
  // How many times this boss re-weaves a broken barrier (at reduced
  // strength) before staying down for good. Demon lords start earning a
  // second wind at higher stages so the fight keeps escalating across the
  // whole 1000-level run instead of staying static after the first world.
  // (Archons and the final boss are untouched by this change.)
  if(demon.isFinal) return 1;
  if(demon.isGod) return 0;
  if(demon.isDemon){
    const stage = Math.floor((levelIndex + 1) / 20);

function damageBarrier(demon, amount, x, y){
  if(!demon || !(demon._barrierHp > 0) || amount <= 0) return;
  demon._barrierHp -= amount;
  spawnFloatText(x, y - 12, Math.round(amount), "#b478ff", amount > 250);
  playSfx("barrierChip");
  spawnShockwave(x, y, "#b478ff", 70, 0.3);
  createImpactParticles(x, y, "#d9b8ff", 10);
  if(demon._barrierHp <= 0){
    demon._barrierHp = 0;
    demonShieldBroken = true;
    const dx = demon.x, dy = demon.bottom - demon.h/2;
    showDemonLabel("demonShieldBreak", "#ffd700");
    spawnShockwave(dx, dy, "#b478ff", demon.w * 1.3, 0.55);
    spawnShockwave(dx, dy, "#ffffff", demon.w * 0.85, 0.4);
    createImpactParticles(dx, dy, "#d9b8ff", 32);
    createImpactParticles(dx, dy, "#ffffff", 14);

function resetDemonShieldForShot(){
  const demon = getLivingDemon();
  if(!demon){ demonShieldBroken = true; return; }
  if(demon._barrierHp === undefined){
    demon._barrierMax = getDemonBarrierBaseHp(demon);
    demon._barrierHp = demon._barrierMax;
    demon._barrierRegens = getBarrierRegens(demon);
  } else if(demon._barrierHp <= 0 && demon._barrierRegens > 0){
    // Re-weaves a barrier at reduced strength - a real "new move" for

    demon._barrierRegens--;

// Enrage + hit-recoil: any boss tier (mini-boss included) that drops below
// half HP gets a one-time "enrage" flash (label, burst, extra shake) and,
// from then on, a chance to visually flinch/recoil on every hit it takes
// instead of just standing there soaking damage. The recoil is a RENDER-only
// offset (see drawHero) - hitboxes and every other system keep using the
// object's real x/bottom, so nothing else is affected.
function checkBossEnrage(h){
  if(!h.isBoss || h.hp <= 0 || h._enraged) return;
  if(h.hp > h.maxhp * 0.5) return;
  h._enraged = true;
  const hx = h.x, hy = h.bottom - h.h/2;
  showDemonLabelText(tr("bossEnrageCast"), "#ff3b3b");
  spawnShockwave(hx, hy, "#ff3b3b", h.w * 1.2, 0.4);
  spawnShockwave(hx, hy, "#ffcf5c", h.w * 0.8, 0.3);
  createImpactParticles(hx, hy, "#ff5a3c", 24);
  screenShake = Math.min(screenShake + 14, 26);
  triggerHitstop(70);
  playSfx("crit", 0.5);
}
function maybeTriggerBossRecoil(h, hitX, hitY){
  if(!h.isBoss || h.hp <= 0 || h.hp > h.maxhp * 0.5) return;
  if(Math.random() > 0.5) return;
  const dir = (h.x - hitX) < 0 ? -1 : 1;
  h._recoilDx = dir * (14 + Math.random() * 16);
  h._recoilDy = -(6 + Math.random() * 10);
  h._recoilDur = 0.22;
  h._recoilT = 0.22;
}
// Demon aura pulse: while a demon-tier barrier is up, it periodically emits
// a passive push-back pulse that shoves the slime away if it lingers too
// close - a genuinely ACTIVE move instead of a barrier that just sits there
// waiting to be poked. Mini-bosses don't get this (kept lighter/simpler by
// design so the escalation to a real demon fight still means something).
function stepBarrierBossAura(dt){
  const demon = getLivingDemon();
  if(!demon || !(demon._barrierHp > 0) || !(demon.isDemon || demon.isGod || demon.isFinal)) return;
  if(demon._auraT === undefined) demon._auraT = 1.6;
  demon._auraT -= dt;
  if(demon._auraT > 0) return;
  demon._auraT = 2.4;
  const hx = demon.x, hy = demon.bottom - demon.h/2;
  const radius = demon.w * 1.4;
  spawnShockwave(hx, hy, "#b478ff", radius, 0.4);
  createImpactParticles(hx, hy, "#d9b8ff", 14);
  playSfx("deflect", 0.35);
  if(slime && slime.state === "flying"){
    const dx = slime.x - hx, dy = slime.y - hy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < radius && dist > 1){
      const push = 900 * (1 - dist / radius);
      slime.vx += (dx / dist) * push;
      slime.vy += (dy / dist) * push - 120;
    }
  }
}
function triggerRouteSkill(route){
  if(!slime || slime.state !== "flying" || !route) return false;
  // All four routes now have a dedicated behavior while clones are out
  // (see the per-case branches below) - nothing needs to be locked here
  // anymore.
  if(!slime._skillCharges || !(slime._skillCharges[route] > 0)) return false;
  slime._skillCharges[route]--;
  if(!saveData.stats.skillCasts) saveData.stats.skillCasts = { power:0, crit:0, bounce:0, ammo:0 };
  saveData.stats.skillCasts[route] = (saveData.stats.skillCasts[route] || 0) + 1;
  checkAchievements();
  skillCastFlash[route] = performance.now();
  const tier = getSkillTier(route);
  const cx = slime.x, cy = slime.y;
  // Zero Realm now refreshes on EVERY cast - chaining skills keeps the world
  // slowed, and every cast lands with its own punch (flash + hitstop + combo).
  enterZeroRealm(tier, cx, cy);
  triggerCastFlash(ROUTE_COLORS[route] || "#ffffff", 220);
  triggerHitstop(50);
  registerCombo();
  screenShake = Math.min(screenShake + 4, 30);
  spawnShockwave(cx, cy, ROUTE_COLORS[route] || "#ffffff", 55, 0.25);
  switch(route){
    case "power": {
      if(slime._cloneActive && cloneVolley){
        // POWER SURGE mid-swarm: give every live clone a burst of extra
        // speed (same compounding formula as the solo dash) and refresh
        // the volley's countdown so the boosted swarm stays dangerous
        // instead of resolving a split-second later.
        const boostMult = 1.15 + tier * 0.05;
        const boostFlat = 250 + tier * 60;
        for(const c of slimeClones){
          if(c.dead) continue;
          const s0 = Math.sqrt(c.vx*c.vx + c.vy*c.vy) || 1;
          const ns = Math.min(s0 * boostMult + boostFlat, 2400);
          c.vx = (c.vx / s0) * ns;
          c.vy = (c.vy / s0) * ns;
        }
        cloneVolley.timer = Math.max(cloneVolley.timer, 1.2);
        spawnShockwave(slime.x, slime.y, "#ff5a3c", 90, 0.35);
        spawnShockwave(slime.x, slime.y, "#ffcf5c", 60, 0.3);
        createImpactParticles(slime.x, slime.y, "#ffcf5c", 18);
        showDemonLabelText(tr("skillPowerCast"), "#ff5a3c");
        playSfx("power");
        screenShake = Math.min(screenShake + 8, 20);
        break;
      }
      // FULL THROTTLE: convert the cast into raw flight speed along the
      // current heading. No separate damage buff is needed - impact damage
      // already scales with speed, and the extra momentum also feeds BLINK
      // STRIKE (arms at 1350) and the crit route's stop-shockwave.
      const spd0 = Math.sqrt(slime.vx*slime.vx + slime.vy*slime.vy);
      let dirX, dirY;
      if(spd0 < 40){
        const t = nearestVisibleHero(cx, cy);
        if(t){
          const ang = Math.atan2((t.bottom - t.h/2) - cy, t.x - cx);
          dirX = Math.cos(ang); dirY = Math.sin(ang);
        } else { dirX = Math.SQRT1_2; dirY = -Math.SQRT1_2; }
      } else {
        dirX = slime.vx / spd0; dirY = slime.vy / spd0;
      }
      // COMPOUNDING boost: multiply AND add, so stacked casts snowball.
      // (The old max(mult, +flat) formula degenerated to linear +330/cast at
      // low speed - four tier-1 casts from standstill reached 1320, agonizingly
      // 30 short of the 1350 Blink Strike gate. Never again.)
      const boosted = spd0 * (1.15 + tier * 0.05) + 250 + tier * 60;
      const newSpd = Math.min(boosted, 2400);
      slime.vx = dirX * newSpd;
      slime.vy = dirY * newSpd;
      spawnShockwave(cx - dirX*30, cy - dirY*30, "#ff5a3c", 90, 0.35);
      spawnShockwave(cx - dirX*55, cy - dirY*55, "#ffcf5c", 60, 0.3);
      createImpactParticles(cx - dirX*20, cy - dirY*20, "#ffcf5c", 18);
      showDemonLabelText(tr("skillPowerCast"), "#ff5a3c");
      playSfx("power");
      screenShake = Math.min(screenShake + 8, 20);
      applyJellyImpulse(12);
      break;
    }
    case "bounce": {
      if(slime._cloneActive && cloneVolley){
        // CLONE STRIKE: retarget every live clone at once instead of the
        // solo body - homes the whole swarm in on the nearest hero, or
        // sends it into a carpet-bomb dive if nothing's in reach.
        const DASH_SPEED = 1500 + tier*150;
        const target = nearestVisibleHero(cx, cy);
        for(const c of slimeClones){
          if(c.dead) continue;
          if(target){
            const tx = target.x, ty = target.bottom - target.h/2;
            const dx = tx - c.x, dy = ty - c.y;
            const dist = Math.max(Math.sqrt(dx*dx+dy*dy), 1);
            c.vx = (dx/dist) * DASH_SPEED;
            c.vy = (dy/dist) * DASH_SPEED;
          } else {
            c.vx *= 0.2;
            c.vy = 1300 + tier * 200;
          }
        }
        cloneVolley.timer = Math.max(cloneVolley.timer, 1.0);
        spawnShockwave(slime.x, slime.y, "#5db8e8", 80, 0.3);
        createImpactParticles(slime.x, slime.y, "#bfe9ff", 16);
        showDemonLabelText(tr("skillBounceCloneCast"), "#5db8e8");
        playSfx("bounceDash");
        break;
      }
      slime._bounceBoostHits = (slime._bounceBoostHits || 0) + 2 + tier;
      const target = nearestVisibleHero(cx, cy);
      const distTo = target
        ? Math.sqrt((target.x-cx)**2 + ((target.bottom-target.h/2)-cy)**2)
        : Infinity;
      if(target && distTo <= BOUNCE_CHASE_RANGE){
        const tx = target.x, ty = target.bottom - target.h/2;
        const dx = tx-cx, dy = ty-cy;
        const dist = Math.max(Math.sqrt(dx*dx+dy*dy), 1);
        const DASH_SPEED = 1500 + tier*150;
        slime.vx = (dx/dist) * DASH_SPEED;
        slime.vy = (dy/dist) * DASH_SPEED;
        playSfx("bounceDash");
      } else {
        // GROUND DIVE: no enemy in reach - dive straight down and cash the
        // landing back in as an over-unity bounce (pure momentum, no AoE).
        slime._slamTier = tier;
        slime.vx *= 0.15;
        slime.vy = 1300 + tier * 200;
        showDemonLabelText(tr("skillBounceSlam"), "#5db8e8");
        playSfx("slamDive");
      }
      spawnShockwave(cx, cy, "#5db8e8", 70, 0.3);
      createImpactParticles(cx, cy, "#bfe9ff", 14);
      applyJellyImpulse(12);
      break;
    }
    case "crit": {
      if(slime._cloneActive && cloneVolley){
        // CLONE BURST: every live clone cashes in its own momentum as a
        // small directional shockwave at its own position, then drops out
        // of the swarm - a scattered multi-point detonation instead of one
        // big cone from the body.
        let anyLive = false;
        for(const c of slimeClones){
          if(c.dead) continue;
          anyLive = true;
          const spd = Math.sqrt(c.vx*c.vx + c.vy*c.vy);
          const ang = spd > 0.001 ? Math.atan2(c.vy, c.vx) : 0;
          const dirX = Math.cos(ang), dirY = Math.sin(ang);
          const capped = Math.min(spd, 1600);
          const dmg = (60 + tier*20) * Math.pow(capped/800, 2) * getSlimeDamageMultiplier() * (c.dmgMult != null ? c.dmgMult : 1);
          const range = Math.max(90, Math.min(spd * 0.25, 260));
          skillConeDamage(c.x, c.y, dirX, dirY, range, Math.PI*35/180, dmg, "#ffe066");
          spawnShockwave(c.x, c.y, "#ffe066", 55, 0.3);
          createImpactParticles(c.x, c.y, "#ffe066", 12);
          c.dead = true;
        }
        if(anyLive){
          screenShake = Math.min(screenShake + 14, 26);
          showDemonLabelText(tr("skillCritCloneCast"), "#ffd700");
          playSfx("crit", 0.7);
          applyJellyImpulse(14);
        }
        break;
      }
      // DEAD STOP: dump the slime's entire kinetic energy into a directional
      // shockwave along the old heading. Kinetic energy is (1/2)mv^2, so
      // damage scales with speed SQUARED (speed capped at 1600 => max 4x),
      // while the wave's reach scales linearly with speed (momentum).
      const spd = Math.sqrt(slime.vx*slime.vx + slime.vy*slime.vy);
      const ang = spd > 0.001 ? Math.atan2(slime.vy, slime.vx) : 0;
      const dirX = Math.cos(ang), dirY = Math.sin(ang);
      const capped = Math.min(spd, 1600);
      const dmg = (90 + tier*35) * Math.pow(capped/800, 2) * getSlimeDamageMultiplier();
      const range = Math.max(140, Math.min(spd * 0.3, 480));
      slime.vx = 0; slime.vy = 0;
      skillConeDamage(cx, cy, dirX, dirY, range, Math.PI*35/180, dmg, "#ffe066");
      for(let i = 1; i <= 3; i++){
        spawnShockwave(cx + dirX*range*0.28*i, cy + dirY*range*0.28*i,
          i === 1 ? "#ffffff" : "#ffe066", 60 + i*26, 0.3 + i*0.06);
      }
      createImpactParticles(cx + dirX*40, cy + dirY*40, "#ffe066", 24);
      showDemonLabelText(tr("skillCritCast"), "#ffd700");
      playSfx("crit", capped / 1600);
      screenShake = Math.min(screenShake + 10 + capped*0.006, 26);
      applyJellyImpulse(14);
      break;
    }
    case "ammo": {
      if(slime._skyfallActive){
        triggerSkyfallPillars(tier);
      } else {
        startCloneVolley(tier);
        showDemonLabelText(tr("skillAmmoCast"), "#8adf76");
        playSfx("ammo");
      }

}

}

function drawMenuSlime(){

  c.beginPath();
  c.ellipse(0, r*0.55, r*0.8, r*0.22, 0, 0, Math.PI*2);

  c.bezierCurveTo(-r*1.05, -r*0.55, -r*0.6, -r*1.05, 0, -r*1.05);
  c.bezierCurveTo(r*0.6, -r*1.05, r*1.05, -r*0.55, r, r*0.05);
  c.bezierCurveTo(r*1.02, r*0.35, r*0.78, r*0.32, r*0.62, r*0.5);
  c.bezierCurveTo(r*0.5, r*0.66, r*0.22, r*0.66, r*0.12, r*0.48);
  c.bezierCurveTo(r*0.02, r*0.66, -r*0.26, r*0.66, -r*0.36, r*0.48);
  c.bezierCurveTo(-r*0.46, r*0.66, -r*0.74, r*0.66, -r*0.86, r*0.48);
  c.bezierCurveTo(-r*1.0, r*0.32, -r*1.02, r*0.35, -r, r*0.05);
  c.closePath();
  const grad = c.createRadialGradient(-r*0.35, -r*0.6, r*0.1, 0, -r*0.1, r*1.4);
  grad.addColorStop(0, pal.light);
  grad.addColorStop(0.45, pal.mid);
  grad.addColorStop(1, pal.dark);
  c.fillStyle = grad;
  c.fill();
  c.strokeStyle = pal.stroke;
  c.lineWidth = 2.5;
  c.stroke();
  c.fillStyle = "rgba(255,255,255,0.55)";
  c.beginPath();
  c.ellipse(-r*0.38, -r*0.62, r*0.28, r*0.16, -0.5, 0, Math.PI*2);
  c.fill();
  c.fillStyle = "rgba(255,255,255,0.3)";
  c.beginPath();
  c.ellipse(r*0.15, -r*0.35, r*0.1, r*0.06, -0.4, 0, Math.PI*2);
  c.fill();
  c.fillStyle = "rgba(255,140,150,0.55)";
  c.beginPath();
  c.ellipse(-r*0.5, r*0.02, r*0.16, r*0.1, 0, 0, Math.PI*2);
  c.ellipse(r*0.5, r*0.02, r*0.16, r*0.1, 0, 0, Math.PI*2);

    c.ellipse(ex, ey, r*0.13, r*0.17, 0, 0, Math.PI*2);
    c.fill();
    c.fillStyle = "#ffffff";
    c.beginPath();
    c.arc(ex + side*r*0.045, ey - r*0.06, r*0.05, 0, Math.PI*2);
    c.fill();
  }
  c.strokeStyle = "#1f3a26";
  c.lineWidth = 2;
  c.lineCap = "round";
  c.beginPath();
  c.arc(0, r*0.02, r*0.22, 0.25*Math.PI, 0.75*Math.PI);
  c.stroke();
  c.restore();
}

function mapDecorHtmlFor(worldIdx){

    '<div class="map-decor map-decor-cloud" style="top:5%;left:72%;width:20%;"></div>'
  ];
  return decorByWorld[worldIdx % decorByWorld.length] || "";
}
function renderMapPath(){
  const wrap = mapPathEl.parentElement;
  const scrollBefore = wrap ? wrap.scrollTop : 0;
  mapPathEl.innerHTML = "";
  const theme = WORLD_THEMES[mapWorldIdx];
  mapPathEl.style.setProperty("--world-sky-top", theme.skyTop);
  mapPathEl.style.setProperty("--world-sky-bot", theme.skyBot);
  mapPathEl.style.setProperty("--world-ground", theme.groundTop);
  mapPathEl.insertAdjacentHTML("beforeend", '<div class="map-decor-layer">' + mapDecorHtmlFor(mapWorldIdx) + '</div>');
  const trackEl = document.createElement("div");
  trackEl.className = "map-track";
  mapPathEl.appendChild(trackEl);

  const cl = mapCycleLength();
  const baseIdx = (mapCycle - 1) * cl + mapWorldIdx * 20;
  const nextPlayable = Math.min(saveData.currentLevel, TOTAL_LEVELS - 1);
  const wrapWidth = (wrap && wrap.clientWidth) || 600;
  const wrapHeight = (wrap && wrap.clientHeight) || 400;
  // Search for the column count that lets all 20 nodes fit as large as
  // possible within the visible area, so the whole world is viewable at
  // once rather than requiring a lot of scrolling.
  let cols = 4, bestSize = 0;
  for(let c = 3; c <= 10; c++){
    const rows = Math.ceil(20 / c);
    const sizeByWidth = wrapWidth / c - 18;
    const sizeByHeight = (wrapHeight - 14 * (rows - 1)) / rows - 22;
    const size = Math.max(0, Math.min(sizeByWidth, sizeByHeight));
    if(size > bestSize){ bestSize = size; cols = c; }
  }
  const rows = Math.ceil(20 / cols);
  const nodeSize = Math.max(34, Math.min(bestSize, 100));
  mapPathEl.style.setProperty("--node-size", nodeSize + "px");
  mapPathEl.style.setProperty("--row-gap", "14px");
  const nodes = [];
  for(let row = 0; row < rows; row++){
    const rowEl = document.createElement("div");
    rowEl.className = "map-row" + (row % 2 === 1 ? " reverse" : "");
    let any = false;
    for(let col = 0; col < cols; col++){
      const i = row * cols + col;
      const globalIdx = baseIdx + i;
      if(globalIdx >= TOTAL_LEVELS || i >= 20) continue;
      any = true;
      const type = levelTypeForGlobalIndex(globalIdx);
      const state = globalIdx < saveData.currentLevel ? "done" : (globalIdx === nextPlayable && saveData.currentLevel < TOTAL_LEVELS ? "current" : "locked");
      const node = document.createElement("button");
      node.className = "map-node type-" + type + " state-" + state;
      let icon = "";
      if(type === "final") icon = "👑";
      else if(type === "god") icon = "🌟";
      else if(type === "demon") icon = "😈";
      else if(type === "boss") icon = "⚔️";
      node.innerHTML =
        '<span class="map-node-num">' + (globalIdx + 1) + '</span>' +
        (icon ? '<span class="map-node-icon">' + icon + '</span>' : '') +
        (state === "locked" ? '<span class="map-node-lock">🔒</span>' : '') +
        (state === "done" ? '<span class="map-node-check">✔</span>' : '');
      if(state !== "locked"){
        node.addEventListener("click", () => {
          mapScreen.classList.add("hidden");
          startLevel(globalIdx);
        });
      } else {
        node.disabled = true;
      }
      rowEl.appendChild(node);
      nodes.push(node);
    }
    if(any) mapPathEl.appendChild(rowEl);
  }
  // Draw a winding trail line through the actual rendered node centers.
  if(nodes.length > 1){
    const pathBox = mapPathEl.getBoundingClientRect();
    const pts = nodes.map(n => {
      const r = n.getBoundingClientRect();
      return { x: r.left + r.width / 2 - pathBox.left, y: r.top + r.height / 2 - pathBox.top };
    });
    let d = "M " + pts[0].x + " " + pts[0].y + " ";
    for(let i = 1; i < pts.length; i++){
      const p0 = pts[i - 1], p1 = pts[i];
      const midX = (p0.x + p1.x) / 2;
      d += "C " + midX + " " + p0.y + " " + midX + " " + p1.y + " " + p1.x + " " + p1.y + " ";
    }
    trackEl.outerHTML =
      '<svg class="map-track" width="' + pathBox.width + '" height="' + pathBox.height + '" style="position:absolute;top:0;left:0;">' +
        '<path d="' + d + '" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="8" stroke-linecap="round" stroke-dasharray="2 22"/>' +
      '</svg>';
  }
  if(wrap) wrap.scrollTop = scrollBefore;
}

function drawSlimeSwatch(canvas, palette){
  const c = canvas.getContext("2d");
  const w = canvas.width, h = canvas.height;
  c.clearRect(0, 0, w, h);
  const cx = w/2, cy = h/2 + h*0.06, r = w*0.38;
  c.save();
  c.translate(cx, cy);
  c.beginPath();
  c.moveTo(-r, r*0.05);
  c.bezierCurveTo(-r*1.05, -r*0.55, -r*0.6, -r*1.05, 0, -r*1.05);
  c.bezierCurveTo(r*0.6, -r*1.05, r*1.05, -r*0.55, r, r*0.05);
  c.bezierCurveTo(r*1.02, r*0.35, r*0.78, r*0.32, r*0.62, r*0.5);
  c.bezierCurveTo(r*0.5, r*0.66, r*0.22, r*0.66, r*0.12, r*0.48);
  c.bezierCurveTo(r*0.02, r*0.66, -r*0.26, r*0.66, -r*0.36, r*0.48);
  c.bezierCurveTo(-r*0.46, r*0.66, -r*0.74, r*0.66, -r*0.86, r*0.48);
  c.bezierCurveTo(-r*1.0, r*0.32, -r*1.02, r*0.35, -r, r*0.05);
  c.closePath();
  const grad = c.createRadialGradient(-r*0.35, -r*0.6, r*0.1, 0, -r*0.1, r*1.4);
  grad.addColorStop(0, palette.light);
  grad.addColorStop(0.45, palette.mid);
  grad.addColorStop(1, palette.dark);
  c.fillStyle = grad;
  c.fill();
  c.strokeStyle = palette.stroke;
  c.lineWidth = 2;
  c.stroke();
  c.restore();
}

  { route:"bounce", side:-1, row:1 },

// ===== Cutscene engine (story mode) =====
// A tiny timeline player: gameplay freezes (gameState = "cutscene"), the
// frozen battlefield keeps rendering underneath, and timed steps draw on
// top - letterbox bars, titles, dialogue, tints, flashes, bursts, a camera
// zoom. Any tap or key skips. Zero assets: everything is drawn live.
let cutscene = null;
function easeIO(p){ return p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p + 2, 2) / 2; }
function stepAlpha(p){ return Math.min(1, Math.min(p, 1 - p) * 5); }
function startCutscene(steps, onEnd){
  if(!steps || steps.length === 0){ if(onEnd) onEnd(); return; }
  const dur = steps.reduce((m, s) => Math.max(m, s.t + (s.dur || 0)), 0);
  cutscene = { steps: steps, t: 0, dur: dur, onEnd: onEnd || null, cam: null };
  gameState = "cutscene";
}
function endCutscene(){
  const cb = cutscene ? cutscene.onEnd : null;
  cutscene = null;
  gameState = "playing";
  if(cb) cb();
}
function skipCutscene(){ if(cutscene) endCutscene(); }
function updateCutscene(rawDt){
  if(!cutscene) return;
  cutscene.t += rawDt;
  if(cutscene && cutscene.t >= cutscene.dur) endCutscene();
}
function drawCutStep(s, p){
  switch(s.kind){
    case "bars": {
      ctx.globalAlpha = stepAlpha(p);
      ctx.fillStyle = "#000000";
      ctx.fillRect(0, 0, W, 52);
      ctx.fillRect(0, H - 52, W, 52);
      break;
    }
    case "tint": {
      ctx.globalAlpha = (s.a || 0.3) * stepAlpha(p);
      ctx.fillStyle = s.color || "#000000";
      ctx.fillRect(0, 0, W, H);
      break;
    }
    case "flash": {
      ctx.globalAlpha = (1 - p) * 0.85;
      ctx.fillStyle = s.color || "#ffffff";
      ctx.fillRect(0, 0, W, H);
      break;
    }
    case "title": {
      ctx.globalAlpha = stepAlpha(p);
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.font = "bold " + Math.round(30 + 4 * easeIO(Math.min(p * 3, 1))) + "px sans-serif";
      ctx.fillStyle = s.color || "#ffd77a";
      ctx.shadowColor = s.color || "#ffd77a";
      ctx.shadowBlur = 16;
      ctx.fillText(s.textKey === "__raw__" ? s._raw : tr(s.textKey), W/2, H * 0.34);
      ctx.shadowBlur = 0;
      if(s.subKey){
        ctx.font = "15px sans-serif";
        ctx.fillStyle = "#e8f0ff";
        ctx.fillText(tr(s.subKey), W/2, H * 0.34 + 34);
      }
      break;
    }
    case "line": {
      const a = stepAlpha(p);
      ctx.globalAlpha = a * 0.92;
      const bw = 660, bh = 56, bx = W/2 - bw/2, by = H - 104;
      ctx.fillStyle = "rgba(8,12,28,0.88)";
      roundRectPath(bx, by, bw, bh, 10);
      ctx.fill();
      ctx.strokeStyle = s.color || "rgba(255,255,255,0.4)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.globalAlpha = a;
      ctx.textAlign = "left"; ctx.textBaseline = "middle";
      let tx = bx + 16;
      if(s.whoKey){
        ctx.font = "bold 14px sans-serif";
        ctx.fillStyle = s.color || "#ffd77a";
        const who = tr(s.whoKey);
        ctx.fillText(who, tx, by + bh/2);
        tx += ctx.measureText(who).width + 14;
      }
      ctx.font = "15px sans-serif";
      ctx.fillStyle = "#f0f5ff";
      ctx.fillText(tr(s.textKey, s.vars || {}), tx, by + bh/2);
      break;
    }
    case "pillar": {
      const a = stepAlpha(p);
      const pw = 90 + 40 * easeIO(p);
      const g = ctx.createLinearGradient(s.x - pw/2, 0, s.x + pw/2, 0);
      g.addColorStop(0, "rgba(255,240,180,0)");
      g.addColorStop(0.5, "rgba(255,240,180," + (0.55 * a) + ")");
      g.addColorStop(1, "rgba(255,240,180,0)");
      ctx.fillStyle = g;
      ctx.fillRect(s.x - pw/2, 0, pw, H);
      break;
    }
    case "slimeCameo": {
      const t = p * (s.dur || 1) * 6;
      const bounce = Math.abs(Math.sin(t * 2.2));
      const cx0 = W/2, cy0 = H * 0.62 - bounce * 70;
      const squash = 1 - 0.25 * (1 - bounce);
      ctx.globalAlpha = stepAlpha(p);
      ctx.fillStyle = "#66d894";
      ctx.beginPath();
      ctx.ellipse(cx0, cy0, 26 / squash, 26 * squash, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#1e3a26";
      ctx.beginPath(); ctx.arc(cx0 - 8, cy0 - 5, 3.4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx0 + 8, cy0 - 5, 3.4, 0, Math.PI*2); ctx.fill();
      break;
    }
    case "shake": {
      if(!s._fired){ s._fired = true; screenShake = Math.min(screenShake + (s.amp || 12), 30); }
      break;
    }
    case "burst": {
      if(!s._fired){
        s._fired = true;
        for(const b of (s.at || [])){
          createImpactParticles(b.x, b.y, s.color || "#ffffff", b.n || 16);
          if(b.wave) spawnShockwave(b.x, b.y, s.color || "#ffffff", b.wave, 0.45);
        }
      }
      break;
    }
    case "zoom": {
      const sc = 1 + ((s.s || 1.5) - 1) * easeIO(Math.min(p * 2, 1)) * (p > 0.85 ? (1 - p) / 0.15 : 1);
      cutscene.cam = { x: s.x, y: s.y, s: Math.max(sc, 1) };
      break;
    }
  }
}
function drawCutscene(){
  if(!cutscene) return;
  const t = cutscene.t;

  ctx.save();
  for(const s of cutscene.steps){
    if(t < s.t || t > s.t + (s.dur || 0)) continue;
    const p = Math.max(0, Math.min((t - s.t) / Math.max(s.dur || 0.0001, 0.0001), 1));
    ctx.save();
    drawCutStep(s, p);
    ctx.restore();
  }
  ctx.globalAlpha = 0.55 + Math.sin(performance.now()/400) * 0.2;
  ctx.font = "12px sans-serif";
  ctx.textAlign = "right"; ctx.textBaseline = "bottom";
  ctx.fillStyle = "#ffffff";

  ctx.restore();
}
