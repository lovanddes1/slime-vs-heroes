function queueLevelCutscenes(){
  const lvl = levelIndex + 1;
  const wid = getWorldTheme().id;
  const chain = [];
  if(levelIndex === 0 && !saveData.introSeen){
    chain.push(buildOpeningScene());
    saveData.introSeen = true;
    writeSave();
  }
  if(levelIndex % 20 === 0) {
    chain.push(buildZoneCard(wid));
    worldBannerUntil = 0;
  }
  if(lvl % 20 === 0){
    if(lvl === TOTAL_LEVELS) chain.push(buildFinalScene());
    else if(lvl % 100 === 0) chain.push(buildGodScene(Math.floor(lvl / 100)));
    else chain.push(buildBossScene(wid));
  }
  const play = (i) => { if(i < chain.length) startCutscene(chain[i], () => play(i + 1)); };
  play(0);
}
// ===== Floating damage numbers =====
let floatTexts = [];
function spawnFloatText(x, y, text, color, big){
  floatTexts.push({ x: x, y: y, text: text, color: color || "#ffffff", big: !!big,
    t: 0, life: big ? 1.1 : 0.8, vx: (Math.random() - 0.5) * 50, vy: -(70 + Math.random() * 40) });
  if(floatTexts.length > 40) floatTexts.shift();
}
function updateAndDrawFloatTexts(dt){
  if(floatTexts.length === 0) return;
  ctx.save();
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  for(let i = floatTexts.length - 1; i >= 0; i--){
    const f = floatTexts[i];
    f.t += dt;
    if(f.t >= f.life){ floatTexts.splice(i, 1); continue; }
    f.x += f.vx * dt;
    f.y += f.vy * dt;
    f.vy += 90 * dt;
    const p = f.t / f.life;
    const pop = f.big ? (p < 0.15 ? 1 + (0.15 - p) * 4 : 1) : 1;
    ctx.globalAlpha = p < 0.7 ? 1 : (1 - p) / 0.3;
    ctx.font = "bold " + Math.round((f.big ? 21 : 13) * pop) + "px sans-serif";
    ctx.strokeStyle = "rgba(0,0,0,0.75)";
    ctx.lineWidth = 3;
    ctx.strokeText(f.text, f.x, f.y);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.restore();
}
function circleRectCollide(cx, cy, cr, rect){
  const left = rect.x - rect.w/2;
  const right = rect.x + rect.w/2;
  const top = rect.bottom - rect.h;
  const bottom = rect.bottom;
  const closestX = Math.max(left, Math.min(cx, right));
  const closestY = Math.max(top, Math.min(cy, bottom));
  const dx = cx - closestX;
  const dy = cy - closestY;
  const distSq = dx*dx + dy*dy;
  if(distSq < cr*cr){
    return {dx, dy, dist:Math.sqrt(distSq), closestX, closestY};
  }
  return null;
}
function createImpactParticles(x, y, color, count){
  for(let i=0; i<count; i++){
    particles.push({
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 260,
      vy: (Math.random() - 0.5) * 260 - 80,
      color: color,
      r: Math.random() * 4 + 2,
      alpha: 1,
      life: 0.4 + Math.random() * 0.4
    });
  }
}
function triggerBombSplash(cx, cy, sourceObj){
  const RADIUS = 220;
  spawnShockwave(cx, cy, "#ff8a3d", RADIUS, 0.5);
  spawnShockwave(cx, cy, "#ffe066", RADIUS*0.6, 0.35);
  createImpactParticles(cx, cy, "#ffcf5c", 24);
  createImpactParticles(cx, cy, "#ff5722", 16);
  const all = blocks.concat(heroes).filter(o => o.hp > 0 && o !== sourceObj && !isHeroHidden(o));
  for(const obj of all){
    const ox = Math.max(obj.x - obj.w/2, Math.min(cx, obj.x + obj.w/2));
    const oy = Math.max(obj.bottom - obj.h, Math.min(cy, obj.bottom));
    const dx = ox - cx, dy = oy - cy;
    if(Math.sqrt(dx*dx + dy*dy) <= RADIUS){
      if(isDamageNullified(obj)){
        spawnShockwave(ox, oy, "#ff5a5a", 70, 0.35);
        createImpactParticles(ox, oy, "#ff5a5a", 10);
        continue;
      }
      let splashDmg = 180 * getSlimeDamageMultiplier();
      if(obj.heroClass) splashDmg = applyFrostArmor(obj, splashDmg, ox, oy);
      if(obj.heroClass) splashDmg = adjustFinalDamage(obj, splashDmg);
      obj.hp -= splashDmg;
      createImpactParticles(ox, oy, "#ff8a3d", 14);
      if(obj.heroClass) maybeDesertBurrow(obj);
      if(obj.heroClass) applyFinalAspectOnHit(obj, ox, oy);
    }
  }
  screenShake = Math.min(screenShake + 22, 30);
}
function resolveSlimeVsObject(obj, isHero){
  const radius = getSlimeRadius();
  const col = circleRectCollide(slime.x, slime.y, radius, obj);
  if(!col) return false;
  const speed = Math.sqrt(slime.vx*slime.vx + slime.vy*slime.vy);
  let nx, ny;
  if(col.dist > 0.001){
    nx = col.dx / col.dist;
    ny = col.dy / col.dist;
  } else {
    nx = 0; ny = -1;
  }
  const overlap = radius - col.dist;
  slime.x += nx * overlap;
  slime.y += ny * overlap;
  // While the demon's barrier is up, it reflects the slime with MORE energy
  // than it arrived with - even a Heavy slime gets flung back.
  if(slime._skyfallActive){
    // the plunging palm detonates on the first thing it touches
    triggerSkyfallImpact(col.closestX, col.closestY);
  }
  const nullified = isHero && isDamageNullified(obj);
  const restitution = nullified ? 1.25 : (slime.bouncy ? 1.54 : (slime.heavy ? 0.12 :
    (slime._bounceBoostHits > 0 ? Math.min(getBounceRestitution() + 0.35, 1.5) : getBounceRestitution())));
  if(slime._bounceBoostHits > 0){
    slime._bounceBoostHits--;
    spawnShockwave(col.closestX, col.closestY, "#5db8e8", 50, 0.25);
  }
  const dot = slime.vx*nx + slime.vy*ny;
  slime.vx = (slime.vx - 2*dot*nx) * restitution;
  slime.vy = (slime.vy - 2*dot*ny) * restitution;
  if(slime.bouncy){
    const spd = Math.sqrt(slime.vx*slime.vx + slime.vy*slime.vy);
    const SPEED_CAP = 2000;
    if(spd > SPEED_CAP){
      slime.vx = slime.vx / spd * SPEED_CAP;
      slime.vy = slime.vy / spd * SPEED_CAP;
    }
    spawnShockwave(col.closestX, col.closestY, "#7cf5c4", 55, 0.3);
    createImpactParticles(col.closestX, col.closestY, "#baffe0", 10);
  }
  if(slime.heavy){
    spawnShockwave(col.closestX, col.closestY, "#6e4023", 70, 0.35);
    createImpactParticles(col.closestX, col.closestY, "#3d2818", 14);
  }
  if(slime.giant){
    spawnShockwave(col.closestX, col.closestY, "#f0b83d", 85, 0.35);
    createImpactParticles(col.closestX, col.closestY, "#ffe9b0", 14);
  }
  applyJellyImpulse(Math.min(speed / 700, 1) * 10);
  if(nullified){
    if(!obj._hitCooldown || obj._hitCooldown <= 0){
      obj._hitCooldown = 0.35;
      // a raw body slam chips the barrier for 25% of the impact speed
      damageBarrier(obj, speed * 0.25, col.closestX, col.closestY);
      playSfx("deflect");
      showDemonLabel("demonNullified", "#ff5a5a");
      if(obj.isGod){
        // 神罰: an archon's barrier siphons life from every reflected hit
        obj.hp = Math.min(obj.maxhp, obj.hp + obj.maxhp * 0.03);
        createImpactParticles(obj.x, obj.bottom - obj.h*0.8, "#ffd700", 12);
      }
      spawnShockwave(col.closestX, col.closestY, "#ff5a5a", 100, 0.4);
      spawnShockwave(col.closestX, col.closestY, "#8a1c1c", 60, 0.3);
      createImpactParticles(col.closestX, col.closestY, "#ff5a5a", 18);
      screenShake = Math.min(screenShake + 8, 16);
    }
    // Guarantee a visible fling even from a slow touch.
    const outSpeed = Math.sqrt(slime.vx*slime.vx + slime.vy*slime.vy);
    const MIN_REFLECT = 620;
    if(outSpeed > 0.001 && outSpeed < MIN_REFLECT){
      slime.vx = slime.vx / outSpeed * MIN_REFLECT;
      slime.vy = slime.vy / outSpeed * MIN_REFLECT;
    }
    return true;
  }
  if(!obj._hitCooldown || obj._hitCooldown <= 0){
    let dmg = (isHero ? speed * HERO_DMG_MULT : speed * BLOCK_DMG_MULT) * getSlimeDamageMultiplier();
    if(slime.heavy) dmg *= 8;
    if(slime.giant) dmg *= 3;
    const isCrit = slime._guaranteedCritHits > 0 || Math.random() < getCritChance();
    if(isCrit) dmg *= 2;
    if(dmg > 2){
      if(isHero) dmg = applyFrostArmor(obj, dmg, col.closestX, col.closestY);
      if(isHero) dmg = adjustFinalDamage(obj, dmg);
      obj.hp -= dmg;
      obj._hitCooldown = 0.35;
      if(isHero) maybeDesertBurrow(obj);
      if(isHero) applyFinalAspectOnHit(obj, col.closestX, col.closestY);
      if(obj.isBoss) maybeTriggerBossRecoil(obj, col.closestX, col.closestY);
      if(slime._guaranteedCritHits > 0) slime._guaranteedCritHits--;
      const partColor = isCrit
        ? "#ffe066"
        : (isHero ? (obj.isBoss ? "#ffd700" : "#f2c896") : "#a9673a");
      createImpactParticles(col.closestX, col.closestY, partColor, obj.isBoss ? 25 : (isCrit ? 20 : 12));
      if(isHero) spawnFloatText(col.closestX, col.closestY - 12, Math.round(dmg), isCrit ? "#ffe066" : "#ffffff", isCrit);
      playSfx(isHero ? "hitHero" : "hitBlock", Math.min(speed / 1500, 1));
      if(isCrit) playSfx("critHit");
      if(slime.heavy) spawnShockwave(col.closestX, col.closestY, "#ffb347", 90, 0.4);
      if(slime.giant) spawnShockwave(col.closestX, col.closestY, "#ffd77a", 100, 0.4);
      const shakeFactor = obj.isBoss ? (obj._enraged ? 2.8 : 2.2) : 1.0;
      screenShake = Math.min(screenShake + speed * 0.015 * shakeFactor * (slime.heavy || slime.giant ? 1.6 : 1), obj.isBoss ? 25 : 12);
      if(slime.bomb && !slime._bombUsed){
        slime._bombUsed = true;
        triggerBombSplash(col.closestX, col.closestY, obj);
      }
    }
  }
  return true;
}
function updateStructurePhysics(dt){
  const all = blocks.concat(heroes).filter(o => o.hp > 0);
  for(const obj of all){
    if(obj._hitCooldown > 0) obj._hitCooldown -= dt;
    if(obj._rageFlash > 0) obj._rageFlash -= dt;
    if(obj._recoilT > 0) obj._recoilT -= dt;
    if(obj.isBoss) checkBossEnrage(obj);
    const left = obj.x - obj.w/2, right = obj.x + obj.w/2;
    let supported = false;
    if(obj.bottom >= GROUND_Y - 1) supported = true;
    if(!supported){
      for(const other of all){
        if(other === obj) continue;
        const oTop = other.bottom - other.h;
        if(Math.abs(oTop - (obj.bottom)) < 3){
          const oLeft = other.x - other.w/2, oRight = other.x + other.w/2;
          if(right > oLeft && left < oRight){ supported = true; break; }
        }
      }
    }
    if(!supported){
      obj._fallVy = (obj._fallVy || 0) + GRAVITY * dt;
      obj.bottom += obj._fallVy * dt;
      if(obj.bottom >= GROUND_Y){
        obj.bottom = GROUND_Y;
        obj._fallVy = 0;
      } else {
        for(const other of all){
          if(other === obj) continue;
          const oTop = other.bottom - other.h;
          const oLeft = other.x - other.w/2, oRight = other.x + other.w/2;
          if(obj.bottom >= oTop && obj.bottom - obj._fallVy*dt <= oTop &&
             right > oLeft && left < oRight){
            obj.bottom = oTop;
            obj._fallVy = 0;
            break;
          }
        }
      }
    } else {
      obj._fallVy = 0;
    }
  }
}
function stepSlime(dt){
  if(!slime) return;
  updateJelly(dt);
  if(slime._cloneActive){
    // body is dissolved into the six-way volley - only the clones move
    stepClones(dt);
    return;
  }
  const r = getSlimeRadius();
  if(slime.state === "flying"){
    if(slime._skyfallActive){
      // Guided plunge (v1.1.3): the straight-line launch kept curving under
      // gravity and undershooting. Now gravity is off for the dive and the
      // heading re-locks onto the target every frame - a true homing strike.
      let t = slime._skyfallTarget;
      if(!t || t.hp <= 0 || isHeroHidden(t)){
        t = nearestVisibleHero(slime.x, slime.y);
        slime._skyfallTarget = t || null;
      }
      if(t){
        slime._skyfallAngle = Math.atan2((t.bottom - t.h/2) - slime.y, t.x - slime.x);
      }
      const ang = (typeof slime._skyfallAngle === "number") ? slime._skyfallAngle : Math.PI/2;
      const DIVE_SPEED = 2600;
      slime.vx = Math.cos(ang) * DIVE_SPEED;
      slime.vy = Math.sin(ang) * DIVE_SPEED;
    } else {
      slime.vy += GRAVITY * dt;
    }
    if(slime.magnet){
      const target = heroes.filter(h => h.hp > 0 && !isHeroHidden(h)).sort((a,b) => {
        const da = (a.x-slime.x)**2 + ((a.bottom-a.h/2)-slime.y)**2;
        const db = (b.x-slime.x)**2 + ((b.bottom-b.h/2)-slime.y)**2;
        return da - db;
      })[0];
      if(target){
        const tx = target.x, ty = target.bottom - target.h/2;
        const dx = tx - slime.x, dy = ty - slime.y;
        const dist = Math.max(Math.sqrt(dx*dx+dy*dy), 1);
        const HOMING_ACCEL = 3300;
        slime.vx += (dx/dist) * HOMING_ACCEL * dt;
        slime.vy += (dy/dist) * HOMING_ACCEL * dt;
        if(Math.random() < 0.6){
          particles.push({
            x: slime.x, y: slime.y,
            vx: (Math.random()-0.5)*40, vy: (Math.random()-0.5)*40,
            color: "#7CFC9A", r: Math.random()*3+2, alpha:1, life: 0.25
          });
        }
      }
    }
    if(slime.bomb && Math.random() < 0.55){
      particles.push({
        x: slime.x, y: slime.y,
        vx: (Math.random()-0.5)*60, vy: (Math.random()-0.5)*60 - 30,
        color: Math.random() < 0.5 ? "#ff8c3c" : "#ffd15c", r: Math.random()*3+2, alpha:1, life: 0.32
      });
    }
    if(slime.heavy && Math.random() < 0.45){
      particles.push({
        x: slime.x, y: slime.y + r*0.5,
        vx: (Math.random()-0.5)*30, vy: Math.random()*15,
        color: "#8a8a90", r: Math.random()*3+2, alpha:1, life: 0.3
      });
    }
    if(slime.giant && Math.random() < 0.5){
      particles.push({
        x: slime.x, y: slime.y + r*0.5,
        vx: (Math.random()-0.5)*35, vy: Math.random()*20,
        color: Math.random() < 0.5 ? "#f0b83d" : "#ffe9b0", r: Math.random()*3.5+2, alpha:1, life: 0.32
      });
    }
    if(slime.bouncy && Math.random() < 0.5){
      particles.push({
        x: slime.x, y: slime.y,
        vx: (Math.random()-0.5)*40, vy: (Math.random()-0.5)*40,
        color: "#bff2ff", r: Math.random()*2.5+1.5, alpha:1, life: 0.28
      });
    }
    if(levelLuckActive && Math.random() < 0.35){
      particles.push({
        x: slime.x, y: slime.y,
        vx: (Math.random()-0.5)*30, vy: -Math.random()*40 - 10,
        color: "#ffe066", r: Math.random()*2+1.5, alpha:1, life: 0.4
      });
    }
    slime.x += slime.vx * dt;
    slime.y += slime.vy * dt;
    if(slime.x - r < 0){ slime.x = r; slime.vx *= -0.5; }
    if(slime.x + r > W){ slime.x = W - r; slime.vx *= -0.5; }
    if(slime.y + r > GROUND_Y){
      if(slime._skyfallActive){
        slime.y = GROUND_Y - r;
        triggerSkyfallImpact(slime.x, GROUND_Y);
      } else if(slime._slamTier){
        // GROUND DIVE landing: no damage - the impact is converted into an
        // over-unity bounce, tilted ~15 degrees toward the nearest enemy so
        // the recovered momentum is actually usable.
        const sTier = slime._slamTier;
        slime._slamTier = 0;
        const impact = Math.max(Math.abs(slime.vy), 500);
        slime.y = GROUND_Y - r;
        const outSpd = Math.min(impact * (1.0 + 0.08 * sTier), 2300);
        const t = nearestVisibleHero(slime.x, slime.y);
        const side = t ? (t.x >= slime.x ? 1 : -1) : (slime.vx >= 0 ? 1 : -1);
        const tilt = 15 * Math.PI/180;
        slime.vx = Math.sin(tilt) * outSpd * side;
        slime.vy = -Math.cos(tilt) * outSpd;
        playSfx("slamLand", Math.min(outSpd / 2300, 1));
        spawnShockwave(slime.x, GROUND_Y, "#5db8e8", 130 + sTier*20, 0.4);
        spawnShockwave(slime.x, GROUND_Y, "#bfe9ff", 80, 0.3);
        createImpactParticles(slime.x, GROUND_Y, "#bfe9ff", 20);
        screenShake = Math.min(screenShake + 10 + sTier*2, 22);
        applyJellyImpulse(16);
      } else {
        if(Math.abs(slime.vy) > 100){
          createImpactParticles(slime.x, GROUND_Y, "#66d894", 6);
          screenShake = Math.min(screenShake + Math.abs(slime.vy) * 0.008, 6);
          applyJellyImpulse(Math.min(Math.abs(slime.vy) / 900, 1) * 12);
        }
        slime.y = GROUND_Y - r;
        slime.vy = -slime.vy * 0.42;
        slime.vx *= 0.72;
        if(Math.abs(slime.vy) < 60) slime.vy = 0;
      }
    }
    for(const b of blocks){ if(b.hp > 0) resolveSlimeVsObject(b, false); }
    for(const h of heroes){ if(h.hp > 0 && !isHeroHidden(h)) resolveSlimeVsObject(h, true); }
    checkDeaths();
    const speed = Math.sqrt(slime.vx*slime.vx + slime.vy*slime.vy);
    const onGround = slime.y + r >= GROUND_Y - 1;
    // Anti-softlock: if the slime is barely moving but isn't resting on the
    // ground (e.g. wedged on top of / inside a hero or a block), the game
    // can never reach "settled" state and softlocks. After a short grace
    // period, try knocking it free (if a hero caused it); if it's still
    // stuck after that (or it's wedged against a block with no hero to
    // blame), melt it down to the ground as a guaranteed fix.
    const stuckOnHero = slimeNearAnyHero();
    const stuckCandidate = speed < 70 && !onGround && (stuckOnHero || slimeNearAnyBlock());
    slime._stuckTimer = stuckCandidate ? (slime._stuckTimer || 0) + dt : 0;
    if(slime._stuckTimer > 0.9){
      slime._stuckTimer = 0;
      slime._stuckRescues = (slime._stuckRescues || 0) + 1;
      if(stuckOnHero && slime._stuckRescues <= 1){
        triggerHeroRageKnockback();
      } else {
        triggerSlimeLiquefy();
        return;
      }
    }
    if(speed < 45 && onGround){
      slime.state = "settled";
      settleTimer = 0;
    }
    if(slime.x - r > W + 50){
      slime.state = "settled";
      settleTimer = 0;
    }
  } else if(slime.state === "liquefy"){
    const r = getSlimeRadius();
    slime._liquefyT += dt;
    const t = Math.min(slime._liquefyT / LIQUEFY_DURATION, 1);
    const groundY = GROUND_Y - r;
    if(t < LIQUEFY_MELT_FRAC){
      const mt = t / LIQUEFY_MELT_FRAC;
      slime.y = slime._liquefyStartY + (groundY - slime._liquefyStartY) * mt;
      if(Math.random() < 0.55){
        particles.push({
          x: slime.x + (Math.random()-0.5)*r*1.2, y: slime.y,
          vx: (Math.random()-0.5)*25, vy: Math.random()*90 + 50,
          color: Math.random() < 0.5 ? "#8fe0b0" : "#66d894",
          r: Math.random()*3 + 1.5, alpha: 1, life: 0.35
        });
      }
    } else {
      slime.y = groundY;
    }
    if(t >= 1){
      slime.y = groundY;
      slime.vx = 0; slime.vy = 0;
      slime.state = "settled";
      settleTimer = 0;
      createImpactParticles(slime.x, GROUND_Y, "#66d894", 16);
      screenShake = Math.min(screenShake + 6, 10);
    }
  } else if(slime.state === "settled"){
    settleTimer += dt;
    if(settleTimer > 0.6){
      afterShotResolved();
    }
  }
}
const LIQUEFY_DURATION = 0.75;
const LIQUEFY_MELT_FRAC = 0.55;
function triggerSlimeLiquefy(){
  slime.state = "liquefy";
  slime._liquefyT = 0;
  slime._liquefyStartY = slime.y;
  slime.vx = 0;
  slime.vy = 0;
  createImpactParticles(slime.x, slime.y, "#8fe0b0", 12);
}
function slimeNearAnyHero(){
  const r = getSlimeRadius();
  for(const h of heroes){
    if(h.hp <= 0 || isHeroHidden(h)) continue;
    const left = h.x - h.w/2 - r - 6, right = h.x + h.w/2 + r + 6;
    const top = h.bottom - h.h - r - 6, bottom = h.bottom + r + 6;
    if(slime.x >= left && slime.x <= right && slime.y >= top && slime.y <= bottom) return true;
  }
  return false;
}
function slimeNearAnyBlock(){
  const r = getSlimeRadius();
  for(const b of blocks){
    if(b.hp <= 0) continue;
    const left = b.x - b.w/2 - r - 6, right = b.x + b.w/2 + r + 6;
    const top = b.bottom - b.h - r - 6, bottom = b.bottom + r + 6;
    if(slime.x >= left && slime.x <= right && slime.y >= top && slime.y <= bottom) return true;
  }
  return false;
}
function triggerHeroRageKnockback(){
  const alive = heroes.filter(h => h.hp > 0 && !isHeroHidden(h));
  if(alive.length === 0 || !slime) return;
  let nearest = alive[0], bestDist = Infinity;
  for(const h of alive){
    const hy = h.bottom - h.h/2;
    const d = (h.x - slime.x)**2 + (hy - slime.y)**2;
    if(d < bestDist){ bestDist = d; nearest = h; }
  }
  const hx = nearest.x, hy = nearest.bottom - nearest.h/2;
  let dx = slime.x - hx, dy = slime.y - hy;
  let dist = Math.sqrt(dx*dx + dy*dy);
  if(dist < 1){ dx = 0; dy = -1; dist = 1; }
  dx /= dist; dy /= dist;
  const KNOCK = 1250;
  slime.vx = dx * KNOCK + (Math.random() - 0.5) * 250;
  slime.vy = dy * KNOCK - 350;
  const r = getSlimeRadius();
  slime.x += dx * (nearest.w/2 + r + 4);
  slime.y += dy * (nearest.h/2 + r + 4);
  nearest._rageFlash = 0.55;
  spawnShockwave(hx, hy, "#ff3b3b", 100, 0.5);
  spawnShockwave(hx, hy, "#ffd23b", 70, 0.35);
  createImpactParticles(hx, hy, "#ff5252", 26);
  screenShake = Math.min(screenShake + 18, 25);
  applyJellyImpulse(16);
}
function checkDeaths(){
  for(const b of blocks){
    if(b.hp <= 0 && !b._counted){
      b._counted = true;
      for(const h of heroes){
        if(h.hostBlocks && h.hostBlocks.includes(b) && h.hp > 0){
          if(isHeroHidden(h)){
            // still has other linked boxes standing - small feedback only
            createImpactParticles(b.x, b.bottom - b.h/2, "#f2c896", 8);
          } else if(!h._revealed){
            // last linked box just fell - the hero pops out
            h._revealed = true;
            createImpactParticles(h.x, h.bottom - h.h/2, "#f2c896", 18);
            screenShake = Math.min(screenShake + 8, 20);
          }
        }
      }
    }
  }
  let heroesRemaining = 0;
  for(const h of heroes){
    if(h.hp > 0) heroesRemaining++;
    else if(!h._counted){
      h._counted = true;
      saveData.stats.totalKills = (saveData.stats.totalKills || 0) + 1;
      checkAchievements();
      const killPts = h.isFinal ? 10000 : (h.isGod ? 5000 : (h.isDemon ? 2000 : (h.isBoss ? 500 : 100)));
      score += killPts;
      levelKillScore += killPts;
      killsThisShot++;
      updateHud();
      const explodeColor = h.isFinal ? "#ff4030" : (h.isGod ? "#ffd700" : (h.isDemon ? "#b478ff" : (h.isBoss ? "#ffd700" : "#3f6fd6")));
      createImpactParticles(h.x, h.bottom - h.h/2, explodeColor, h.isFinal ? 90 : (h.isGod ? 70 : (h.isDemon ? 60 : (h.isBoss ? 40 : 20))));
      screenShake = h.isFinal ? 34 : (h.isGod ? 30 : (h.isDemon ? 28 : (h.isBoss ? 20 : 10)));
      if(!h.isBoss){
        const wg = getWorldTheme().gimmick;
        if(wg === "explode") triggerVolcanoExplosion(h);
        else if(wg === "bless") triggerHeavenBlessing(h);
      }
    }
  }
  if(heroesRemaining === 0 && gameState === "playing"){
    queueFinishLevel("win");
  }
}
function afterShotResolved(){
  if(gameState !== "playing") return;
  checkDeaths(); // flush any pending chain-explosion kills before deciding
  if(gameState !== "playing") return; // checkDeaths may have finished the level
  if(killsThisShot === 0) levelHadMiss = true;
  killsThisShot = 0;
  if(pendingOutcome) return; // outcome already queued - no new slime
  const heroesRemaining = heroes.filter(h => h.hp > 0).length;
  if(heroesRemaining === 0){
    queueFinishLevel("win");
    return;
  }
  if(ammoUsed >= ammoTotal){
    queueFinishLevel("lose");
    return;
  }
  spawnSlime();
}
// --- Victory kill-cam ---
// Ending the level the instant the last enemy's HP hits zero felt abrupt:
// the killing blow's particles never got to play out. Instead, the finish is
// QUEUED: on a win the world drops into slow motion for ~1.4s with a golden
// "Victory!" banner while the final impact plays out cinematically, and the
// end screen only appears after 2s. On a loss there's a short 0.8s beat so
// the last slime's dust can settle.
let pendingOutcome = null;
let pendingFinishAt = 0;
let killCamUntil = 0;
let winBannerStart = 0;
const KILLCAM_SCALE = 0.25;
const KILLCAM_SLOWMO_MS = 1400;
const WIN_FINISH_DELAY_MS = 2000;
const LOSE_FINISH_DELAY_MS = 800;
function queueFinishLevel(outcome){
  if(pendingOutcome || gameState !== "playing") return;
  pendingOutcome = outcome;
  if(outcome === "win" && (levelIndex + 1) % 20 === 0){
    // the fallen boss gets a last line during the kill-cam slow-mo
    const wid = getWorldTheme().id;
    const key = (levelIndex + 1) === TOTAL_LEVELS ? null
      : ((levelIndex + 1) % 100 === 0 ? "godDef" : "boss" + wid + "Def");
    if(key) showDemonLabelText(tr(key), "#d9b8ff");
  }
  const now = performance.now();
  if(outcome === "win"){
    pendingFinishAt = now + WIN_FINISH_DELAY_MS;
    killCamUntil = now + KILLCAM_SLOWMO_MS;
    winBannerStart = now;
  } else {
    pendingFinishAt = now + LOSE_FINISH_DELAY_MS;
  }
}
function finishLevel(outcome){
  if(gameState !== "playing") return;
  playSfx(outcome === "win" ? "win" : "lose");
  if(outcome === "win"){
    const isFinalLevel = levelIndex === TOTAL_LEVELS - 1;
    const isGodLevel = !isFinalLevel && (levelIndex + 1) % 100 === 0;
    const isDemonLevel = !isFinalLevel && !isGodLevel && (levelIndex + 1) % 20 === 0;
    const isBossLevel = !isFinalLevel && !isGodLevel && !isDemonLevel && (levelIndex + 1) % 5 === 0;

    // 彈藥效率:評等決定倍率,再乘上剩餘彈藥的線性加分
    const ammoLeft = ammoTotal - ammoUsed;
    const savedRatio = ammoTotal > 0 ? ammoLeft / ammoTotal : 0;
    let ammoRank, ammoMult;
    if(savedRatio >= 0.5){ ammoRank = "SS"; ammoMult = 2.0; }
    else if(savedRatio >= 0.3){ ammoRank = "S"; ammoMult = 1.6; }
    else if(savedRatio >= 0.15){ ammoRank = "A"; ammoMult = 1.3; }
    else if(savedRatio > 0){ ammoRank = "B"; ammoMult = 1.1; }
    else { ammoRank = "C"; ammoMult = 1.0; }
    const ammoBonus = Math.round(ammoLeft * 30 * ammoMult);

    // 連擊加成:整關所有發射過程中,每次技能連鎖累計的加分
    const comboBonus = Math.round(comboBonusAccum);

    // 完美通關:整關每一發彈弓都至少打死一隻勇者,沒有空砲彈
    const perfectClear = !levelHadMiss && ammoUsed > 0;
    const perfectBonus = perfectClear
      ? (isFinalLevel ? 3000 : (isGodLevel ? 1500 : (isDemonLevel ? 800 : (isBossLevel ? 400 : 150))))
      : 0;

    const totalBonus = ammoBonus + comboBonus + perfectBonus;
    score += totalBonus;
    lastScoreBreakdown = {
      killScore: levelKillScore,
      ammoBonus, ammoRank, ammoMult,
      comboBonus, maxCombo: levelMaxCombo,
      perfectBonus, perfectClear,
      total: score
    };

    saveData.currentLevel = Math.max(saveData.currentLevel, levelIndex + 1);
    const prevHighScore = saveData.highScore || 0;
    saveData.highScore = Math.max(saveData.highScore, score);
    if(saveData.highScore > prevHighScore) lbAutoSubmit(saveData.highScore);
    checkAchievements();
    lastCoinsEarned = isFinalLevel ? 50 : (isGodLevel ? 25 : (isDemonLevel ? 10 : (isBossLevel ? 3 : 1)));
    if(levelLuckActive) lastCoinsEarned *= 5;
    saveData.coins = (saveData.coins || 0) + lastCoinsEarned;
    writeSave();
  } else {
    lastScoreBreakdown = null;
  }
  if(outcome === "win" && levelIndex === TOTAL_LEVELS - 1){
    startCutscene(buildEndingScene(), () => showEndScreen(outcome));
    return;
  }
  showEndScreen(outcome);
}
function updateAndDrawParticles(dt){
  for(let i = shockwaves.length - 1; i >= 0; i--){
    const s = shockwaves[i];
    s.life -= dt;
    if(s.life <= 0){ shockwaves.splice(i, 1); continue; }
    const t = 1 - Math.max(0, s.life) / s.maxLife;
    s.r = s.maxR * (1 - Math.pow(1 - t, 2));
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 - t) * 0.8;
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 6 * (1 - t) + 1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }
  for(let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.life -= dt;
    if(p.life <= 0){
      particles.splice(i, 1);
      continue;
    }
    p.vy += 800 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.alpha = Math.max(0, p.life / 0.8);
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawTrajectoryPreview(){
  const dx = SLING_ANCHOR.x - slime.x;
  const dy = SLING_ANCHOR.y - slime.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if(dist < 12) return;
  let px = slime.x, py = slime.y;
  let vx = dx * LAUNCH_POWER, vy = dy * LAUNCH_POWER;
  const stepDt = 0.016;
  const r = getSlimeRadius();
  let bounces = 0;
  const maxBounces = 2;
  for(let i = 1; i <= 320; i++){
    vy += GRAVITY * stepDt;
    px += vx * stepDt;
    py += vy * stepDt;
    let bounced = false;
    if(px - r < 0){ px = r; vx *= -0.5; bounced = true; }
    if(px + r > W){ px = W - r; vx *= -0.5; bounced = true; }
    if(py + r > GROUND_Y){
      py = GROUND_Y - r;
      vy = -vy * 0.42;
      vx *= 0.72;
      if(Math.abs(vy) < 60) vy = 0;
      bounced = true;
    }
    if(bounced){
      bounces++;
      if(bounces > maxBounces) break;
    }
    if(bounces > 0 && Math.abs(vx) < 20 && Math.abs(vy) < 20) break;
    if(i % 2 === 0){
      const predicted = bounces > 0;
      const dotR = Math.max(1.6, (predicted ? 3 : 4.2) - i*0.01);
      ctx.fillStyle = predicted ? "rgba(180,220,255,0.4)" : "rgba(255,255,255,0.8)";
      ctx.beginPath();
      ctx.arc(px, py, dotR, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function drawBlock(b){
  if(b.hp <= 0) return;
  const left = b.x - b.w/2;
  const top = b.bottom - b.h;
  const dmgFrac = Math.max(0, b.hp / b.maxhp);
  const theme = getWorldTheme();
  ctx.fillStyle = dmgFrac > 0.5 ? theme.blockHigh : (dmgFrac > 0.2 ? theme.blockMid : theme.blockLow);
  ctx.fillRect(left, top, b.w, b.h);
  ctx.strokeStyle = theme.blockStroke;
  ctx.lineWidth = 3;
  ctx.strokeRect(left, top, b.w, b.h);
  if(theme.id === "snow"){
    // icy sheen on frozen blocks
    ctx.strokeStyle = "rgba(255,255,255,0.55)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(left + b.w*0.15, top + b.h*0.7);
    ctx.lineTo(left + b.w*0.55, top + b.h*0.15);
    ctx.stroke();
  } else if(theme.id === "volcano"){
    // faint ember veins in obsidian blocks
    ctx.strokeStyle = "rgba(255,110,40,0.35)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(left + b.w*0.25, top + b.h*0.85);
    ctx.lineTo(left + b.w*0.45, top + b.h*0.5);
    ctx.lineTo(left + b.w*0.75, top + b.h*0.3);
    ctx.stroke();
  }
  ctx.strokeStyle = "rgba(0,0,0,0.15)";
  ctx.lineWidth = 1;
  for(let i=1;i<3;i++){
    const yy = top + b.h*i/3;
    ctx.beginPath(); ctx.moveTo(left, yy); ctx.lineTo(left+b.w, yy); ctx.stroke();
  }
  if(dmgFrac < 0.6){
    ctx.strokeStyle = "rgba(0,0,0,0.35)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(left+b.w*0.2, top);
    ctx.lineTo(left+b.w*0.5, top+b.h*0.5);
    ctx.lineTo(left+b.w*0.3, top+b.h);
    ctx.stroke();
  }
  const primaryOccupant = primaryHiddenOccupantOf(b);
  if(primaryOccupant){
    // peeking eyes, kept inside the box's own rect so they never overlap
    // a different box stacked directly above this one
    const bob = Math.sin(performance.now()/450 + b.x) * 1.5;
    const ey = top + Math.min(b.h * 0.22, 10) + bob;
    for(const side of [-1, 1]){
      const ex = b.x + side * Math.min(b.w * 0.15, b.w/2 - 5);
      ctx.fillStyle = "#fff8e8";
      ctx.beginPath();
      ctx.ellipse(ex, ey, 3.2, 4, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#20321f";
      ctx.beginPath();
      ctx.arc(ex, ey + 1, 1.5, 0, Math.PI*2);
      ctx.fill();
    }
  } else {
    const lockOwner = extraLockBoxOccupantOf(b);
    if(lockOwner){
      // this box is a remote "linked mechanism" for a hidden hero elsewhere -
      // draw a small padlock instead of eyes, so it doesn't look like the
      // enemy itself is standing inside an unrelated box
      const cx = b.x, cy = top + Math.min(b.h * 0.4, 16);
      ctx.strokeStyle = "#3a2c1a";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy - 4, 3.6, Math.PI, 0);
      ctx.stroke();
      ctx.fillStyle = "#f0b83d";
      ctx.fillRect(cx - 4.5, cy - 1, 9, 7);
      ctx.strokeStyle = "#8f5f08";
      ctx.lineWidth = 1;
      ctx.strokeRect(cx - 4.5, cy - 1, 9, 7);
    }
  }
}
function roundRectPath(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
const HERO_CLASS_STYLES = {
  knight: { armor:"#3f6fd6", armorDark:"#274a96", accent:"#d8dce3", metal:"#c7cdd6", metalDark:"#8a8f9c" },
  archer: { armor:"#3f8f4a", armorDark:"#255c2c", accent:"#c8e6a0", metal:"#7a5330", metalDark:"#4a3018" },
  mage:   { armor:"#7a4fc9", armorDark:"#4d2f85", accent:"#f0d060", metal:"#3a2660", metalDark:"#241344" },
  tank:   { armor:"#b0562a", armorDark:"#7a3a1a", accent:"#e8b060", metal:"#5c5c5c", metalDark:"#333333" }
};
function drawHero(h){
  if(h.hp <= 0) return;
  const cx = h.x;
  const top = h.bottom - h.h;
  const dmgFrac = Math.max(0, h.hp / h.maxhp);
  ctx.save();
  // Cosmetic-only hit recoil: bosses below half HP flinch/shift on impact
  // instead of just standing there soaking every hit. This ONLY offsets the
  // drawing - hitboxes, collision and every other system still use the
  // object's real x/bottom, so nothing else in the game is affected.
  if(h._recoilT > 0){
    const rt = h._recoilT / (h._recoilDur || 1);
    ctx.translate((h._recoilDx || 0) * rt, (h._recoilDy || 0) * rt);
  }
  if(h._enraged && h.hp > 0){
    // Enrage aura: once a boss drops below half HP it gets a pulsing red
    // glow so the fight visibly escalates instead of looking identical
    // from full HP to near-death.
    const pulse = 0.55 + Math.sin(performance.now()/140 + h.x) * 0.45;
    ctx.save();
    ctx.globalAlpha = 0.32 + pulse * 0.24;
    const grad = ctx.createRadialGradient(cx, top + h.h*0.5, h.w*0.15, cx, top + h.h*0.5, h.w*1.1);
    grad.addColorStop(0, "rgba(255,50,40,0.85)");
    grad.addColorStop(1, "rgba(255,50,40,0)");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, top + h.h*0.5, h.w * (1.05 + pulse*0.15), 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  if(h.isFinal){
    drawFinalBoss(h, cx, top, dmgFrac);
  } else if(h.isGod){
    drawGodHero(h, cx, top, dmgFrac);
  } else if(h.isDemon){
    drawDemonHero(h, cx, top, dmgFrac);
  } else if(h.isBoss){
    drawBossHero(h, cx, top, dmgFrac);
  } else {
    drawMinionHero(h, cx, top, dmgFrac);
  }
  if(h._rageFlash > 0){
    const t = Math.min(1, h._rageFlash / 0.55);
    ctx.save();
    ctx.globalAlpha = t * 0.65;
    const grad = ctx.createRadialGradient(cx, top + h.h*0.4, h.w*0.1, cx, top + h.h*0.4, h.w*1.3);
    grad.addColorStop(0, "rgba(255,60,50,0.9)");
    grad.addColorStop(1, "rgba(255,60,50,0)");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, top + h.h*0.4, h.w*1.3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}
function drawMinionHero(h, cx, top, dmgFrac){

  // (knight/archer/mage/tank silhouettes) but each world re-arms them with

  const cls = (theme.classStyles && theme.classStyles[h.heroClass]) || HERO_CLASS_STYLES[h.heroClass] || HERO_CLASS_STYLES.knight;
  const hurt = dmgFrac <= 0.45;

function drawBarrierBubble(h, cx, top, inner, edge){
  if(!(h._barrierHp > 0) || h.hp <= 0) return;
  const t = performance.now();
  // the bubble visibly fades as its HP is chipped away
  const frac = Math.max(0.3, h._barrierHp / (h._barrierMax || 1));
  const bp = (0.6 + Math.sin(t/300) * 0.25) * frac;
  const rr = Math.max(h.w, h.h) * 0.72;
  const ccy = top + h.h * 0.45;
  ctx.save();
  const g = ctx.createRadialGradient(cx, ccy, rr*0.55, cx, ccy, rr);
  g.addColorStop(0, "rgba(0,0,0,0)");
  g.addColorStop(0.82, inner.replace("ALPHA", (0.10*bp).toFixed(3)));
  g.addColorStop(1, edge.replace("ALPHA", (0.38*bp).toFixed(3)));
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(cx, ccy, rr, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = edge.replace("ALPHA", (0.6*bp).toFixed(3));
  ctx.lineWidth = 3;
  ctx.stroke();
  const spin = t/900;
  ctx.strokeStyle = `rgba(255,255,255,${0.45*bp})`;
  ctx.lineWidth = 2;
  const ticks = 6 + (h._barrierRegens > 0 ? 2 : 0);
  for(let k = 0; k < ticks; k++){
    const a = spin + k * Math.PI * 2 / ticks;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a)*(rr-6), ccy + Math.sin(a)*(rr-6));
    ctx.lineTo(cx + Math.cos(a)*(rr+4), ccy + Math.sin(a)*(rr+4));
    ctx.stroke();
  }
  // a faint second ring while the barrier can still regenerate
  if(h._barrierRegens > 0){
    ctx.strokeStyle = edge.replace("ALPHA", (0.35*bp).toFixed(3));
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx, ccy, rr*0.86, 0, Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}

function hexToRgba(hex, alpha){
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${Math.max(0, Math.min(1, alpha))})`;
}
function drawDemonHero(h, cx, top, dmgFrac){

  ctx.lineTo(cx - h.w*0.12, torsoTop + torsoH*0.45);

  ctx.lineTo(cx + h.w*0.82, top - h.h*0.28);

  ctx.fillStyle = "#c7cdd6";
  ctx.beginPath();

  ctx.quadraticCurveTo(cx + h.w*0.45, top - h.h*0.28, cx + h.w*0.78, top - h.h*0.16);

  ctx.fill();

  ctx.strokeStyle = "#33104a";
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(cx + eyeOffset + headR*0.28, headY - headR*0.4);
  ctx.lineTo(cx + eyeOffset - headR*0.14, headY - headR*0.14);
  ctx.stroke();

  if(h._barrierHp > 0 && h.hp > 0){
    const bp = 0.6 + Math.sin(t/300)*0.25;
    const rr = Math.max(h.w, h.h) * 0.78;

    ctx.lineWidth = 2;

function drawHpBar(obj){
  if(obj.hp <= 0 || obj.hp >= obj.maxhp) return;
  const left = obj.x - obj.w/2;
  const top = obj.bottom - obj.h - 12;
  const frac = Math.max(0, obj.hp / obj.maxhp);
  ctx.fillStyle = "rgba(0,0,0,0.4)";
  ctx.fillRect(left, top, obj.w, 5);

// The canvas backing store used to be a fixed 900x500 - fine in a 900px box,
// visibly blurry once the stage scales to a full desktop monitor. Resize the
// store to the displayed size x devicePixelRatio each frame (cheap no-op when
// unchanged) and map logical 900x500 coords onto it with a transform, so all
// game code keeps drawing in W x H units.
function fitCanvasBackingStore(){
  const dpr = window.devicePixelRatio || 1;
  const cw = Math.max(1, Math.round(canvas.offsetWidth * dpr));
  const ch = Math.max(1, Math.round(canvas.offsetHeight * dpr));
  if(canvas.width !== cw || canvas.height !== ch){
    canvas.width = cw;
    canvas.height = ch;
  }
  ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
}
function render(dt){

    const shakeX = (Math.random() - 0.5) * screenShake;

    ctx.translate(shakeX, shakeY);
    screenShake *= 0.9;
  }
  ctx.clearRect(0,0,W,H);
  drawBackground();
  if(cutscene && cutscene.cam){
    const c = cutscene.cam;
    ctx.translate(c.x, c.y);
    ctx.scale(c.s, c.s);
    ctx.translate(-c.x, -c.y);
  }
  drawSlingshot();
  for(const b of blocks){ drawBlock(b); drawHpBar(b); }

    if(!isHeroHidden(h)){
      drawHero(h);
      drawHpBar(h);
    } else if(heroOwnBoxBroken(h)){
      drawHiddenHeroGhost(h);
    }
  }

  drawDashRing();
  updateAndDrawFloatTexts(dt);
  updateAndDrawParticles(dt);

    vign.addColorStop(0, "rgba(0,0,0,0)");

    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, alpha));

    ctx.font = "bold " + Math.round(H*0.1) + "px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

  if(gameState === "playing" && performance.now() < worldBannerUntil){
    const remain = worldBannerUntil - performance.now();
    const t2 = 1 - remain/2400;
    const alpha = t2 < 0.12 ? t2/0.12 : (t2 > 0.75 ? Math.max(0, 1 - (t2-0.75)/0.25) : 1);

    const wname = wtheme.name[lang] || wtheme.name.zh;

    ctx.fillStyle = "#fdf6e8";

    const vign = ctx.createRadialGradient(W/2, H/2, H*0.28, W/2, H/2, H*0.78);
    vign.addColorStop(0, "rgba(0,0,0,0)");

    ctx.fillStyle = vign;
    ctx.fillRect(0, 0, W, H);

    // banner pops in with a little overshoot, then holds

    ctx.save();

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    const t = 1 - remain/950;
    const alpha = t < 0.2 ? t/0.2 : Math.max(0, 1 - (t-0.2)/0.8);
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
    ctx.fillStyle = demonLabelColor;
    ctx.font = "bold " + Math.round(H*0.062) + "px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = demonLabelColor;
    ctx.shadowBlur = 16;
    ctx.fillText(demonLabelText, W/2, H*0.4);
    ctx.restore();
  }

    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(SKILL_ICONS[s.route], ax + s.ox, ay + s.oy);
    ctx.font = "bold 12px sans-serif";
    ctx.fillStyle = "#ffd77a";
    ctx.fillText(charges, ax + s.ox + 19, ay + s.oy + 17);

function drawUltAndComboFX(){
  drawGestureWheel();
  const now = performance.now();
  // golden pillar trailing behind the palm's dive (tilts with the dive angle)
  if(gameState === "playing" && slime && slime._skyfallActive){
    const r = getSlimeRadius();
    const ang = (typeof slime._skyfallAngle === "number") ? slime._skyfallAngle : Math.PI/2;
    const beamLen = 900;
    ctx.save();
    ctx.translate(slime.x, slime.y);
    ctx.rotate(ang - Math.PI/2); // local -y points opposite the dive direction
    const grad = ctx.createLinearGradient(0, -beamLen, 0, 0);
    grad.addColorStop(0, "rgba(255,215,0,0)");
    grad.addColorStop(0.5, "rgba(255,215,0,0.35)");
    grad.addColorStop(1, "rgba(255,240,180,0.75)");
    ctx.fillStyle = grad;
    ctx.fillRect(-r*1.5, -beamLen, r*3, beamLen);
    ctx.restore();
    createImpactParticles(slime.x + (Math.random()-0.5)*r*2, slime.y - Math.sin(ang)*r*2, "#ffd700", 1);
  }
  // blink-strike afterimages
  for(let i = dashGhosts.length - 1; i >= 0; i--){
    const g = dashGhosts[i];
    const age = now - g.born;
    if(age > g.life){ dashGhosts.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = (1 - age/g.life) * 0.55;
    ctx.fillStyle = "#7cc4ff";
    ctx.beginPath();
    ctx.ellipse(g.x, g.y, g.r, g.r*0.85, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  // Buddha-palm print decals
  for(let i = palmPrints.length - 1; i >= 0; i--){
    const pp = palmPrints[i];
    const age = now - pp.born;
    if(age > 750){ palmPrints.splice(i, 1); continue; }
    const f = age / 750;
    ctx.save();
    ctx.globalAlpha = (1 - f) * 0.9;
    ctx.font = Math.round(150 - f*40) + "px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "#ffd700";
    ctx.shadowBlur = 24;
    ctx.fillText("🖐", pp.x, pp.y - 30 - f*20);
    ctx.restore();
  }
  // six-pillar strike (Buddha Palm chained into the clone skill): vertical
  // gold beams that flash in from full height and fade out fast.
  for(let i = skyPillars.length - 1; i >= 0; i--){
    const sp = skyPillars[i];
    const age = now - sp.born;
    if(age > sp.life){ skyPillars.splice(i, 1); continue; }
    const f = age / sp.life;
    const fade = f < 0.25 ? (f/0.25) : (1 - (f-0.25)/0.75);
    const pw = 46 + 20 * (1 - f);
    ctx.save();
    const grad = ctx.createLinearGradient(sp.x - pw/2, 0, sp.x + pw/2, 0);
    grad.addColorStop(0, "rgba(255,215,0,0)");
    grad.addColorStop(0.5, "rgba(255,236,170," + (0.65 * fade) + ")");
    grad.addColorStop(1, "rgba(255,215,0,0)");
    ctx.fillStyle = grad;
    ctx.fillRect(sp.x - pw/2, 0, pw, GROUND_Y + 20);
    ctx.restore();
  }
  // per-cast edge flash in the skill's color
  if(now < castFlashUntil){
    const a = Math.min((castFlashUntil - now) / 180, 1) * 0.6;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.strokeStyle = castFlashColor;
    ctx.lineWidth = 16;
    ctx.shadowColor = castFlashColor;
    ctx.shadowBlur = 24;
    ctx.strokeRect(6, 6, W-12, H-12);
    ctx.restore();
  }
  // combo counter
  if(gameState === "playing" && slime && slime.state === "flying" && (slime._comboCount || 0) >= 2){
    const sincePop = now - (comboPopUntil - 600);
    const pop = sincePop < 160 ? 1 + (1 - sincePop/160) * 0.45 : 1;
    ctx.save();
    ctx.translate(W*0.20, H*0.15);
    ctx.scale(pop, pop);
    ctx.font = "bold 30px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#ffd700";
    ctx.shadowColor = "#ff9a20";
    ctx.shadowBlur = 12;
    ctx.fillText("COMBO \u00d7" + slime._comboCount, 0, 0);
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = "#8a5a00";
    ctx.strokeText("COMBO \u00d7" + slime._comboCount, 0, 0);
    ctx.restore();
  }
}
function drawFinalAspectTag(y){

function loop(ts){
  if(!lastTime) lastTime = ts;
  const rawDt = Math.min((ts - lastTime) / 1000, 0.033);
  lastTime = ts;
  timeScale = isZeroRealmActive() ? ZERO_REALM_SCALE : 1;
  if(gameState === "playing" && performance.now() < killCamUntil){
    timeScale = Math.min(timeScale, KILLCAM_SCALE);
  }
  if(performance.now() < hitstopUntil){
    timeScale = Math.min(timeScale, 0.05); // per-cast hitstop for impact feel
  }
  const dt = rawDt * timeScale;
  if(gameState === "playing" && pendingOutcome && performance.now() >= pendingFinishAt){
    const out = pendingOutcome;
    pendingOutcome = null;
    finishLevel(out);
  }
  if(cutscene){
    gameState = "cutscene"; // reassert: callers that set "playing" right after startLevel() get corrected here
    updateCutscene(rawDt);
  }
  if(gameState === "playing"){
    updateKeyboardAim(rawDt); // keyboard aiming runs in real time, not game time
    stepSlime(dt);
    updateStructurePhysics(dt);
    updateFinalRegen(dt);
    stepBarrierBossAura(dt);
  }
  updateSkillHint();
  render(dt);
  requestAnimationFrame(loop);
}

// --- Fullscreen / landscape lock ---
// Mobile browsers only allow requestFullscreen inside a user gesture, so we
// piggyback on the first touch: any tap auto-enters fullscreen (hiding the
// URL bar that kept eating stray taps and ejecting players mid-game) and
// tries to lock landscape. The menu button toggles it explicitly; exiting via
// the button also disarms the auto-enter so it doesn't immediately re-trigger.
let autoFullscreenEnabled = true;
function isFullscreen(){
  return !!(document.fullscreenElement || document.webkitFullscreenElement);
}
function updateFullscreenBtn(){
  if(fullscreenBtn) fullscreenBtn.textContent = tr(isFullscreen() ? "fullscreenExit" : "fullscreenEnter");
}
function enterFullscreen(){
  const el = document.documentElement;
  let p = null;
  try{
    if(el.requestFullscreen) p = el.requestFullscreen({ navigationUI: "hide" });
    else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  }catch(e){}
  const lockLandscape = () => {
    try{
      if(screen.orientation && screen.orientation.lock){
        screen.orientation.lock("landscape").catch(() => {});
      }
    }catch(e){}
  };
  if(p && p.then) p.then(lockLandscape, () => {}); else lockLandscape();
}
function exitFullscreen(){
  try{ if(screen.orientation && screen.orientation.unlock) screen.orientation.unlock(); }catch(e){}
  try{
    if(document.exitFullscreen) document.exitFullscreen().catch(() => {});
    else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
  }catch(e){}
}
window.addEventListener("pointerdown", (e) => {
  if(!autoFullscreenEnabled) return;
  if(e.target && e.target.id === "fullscreen-btn") return; // let the button decide
  if(!window.matchMedia("(pointer: coarse)").matches) return; // touch devices only
  if(isFullscreen()) return;
  enterFullscreen();
}, { capture: true, passive: true });

    if(isFullscreen()){
      autoFullscreenEnabled = false;
      exitFullscreen();
    } else {

      enterFullscreen();
    }
  });
}

SLIME VS HEROES — 劇情模式 & 精緻度優化 設計草稿 (Draft v0.2)

【總綱】
勇者王國以「討伐邪惡史萊姆」之名向外擴張,派出騎士、弓兵、法師、坦克四大
兵種,一路從草原打到天界。玩家操控的史萊姆其實是被逼到絕境後覺醒的個體——
每次被砸中反而彈得更高更硬(對應遊戲機制:速度越快,衝擊波越強)。
故事就是史萊姆一路彈跳穿越五個地帶,把勇者王國的擴張線一路打回去。

--------------------------------------------------------------------------------
一、地帶故事(五大地帶,每地帶 20 關為一輪,之後循環)
--------------------------------------------------------------------------------

1. 翠綠草原 Green Plains(起點)
   王國的前線屯墾區。士兵陣形工整、按教科書打仗,對史萊姆毫無防備。
   主題:史萊姆「覺醒」——從被獵殺的對象變成反擊者。

2. 黃沙大漠 Golden Desert
   王國的補給線與異域傭兵團。呼應機制(重傷會鑽沙逃走):
   王國雇用擅長遊擊戰的沙漠部族。
   主題:史萊姆第一次遇到「不硬碰硬」的敵人,學會判斷戰場、追擊逃跑目標。

3. 冰封雪原 Frozen Tundra
   王國的北境精銳軍團,身披冰甲、紀律嚴明(呼應機制:每發首擊傷害減半)。
   主題:王國最強正規軍,史萊姆第一次感受到真正的壓迫感。

4. 熔岩魔域 Molten Demon Realm(轉折點)
   已非純粹王國軍,而是王國向魔界借兵/收編的死士,死亡會自爆(呼應機制)。
   伏筆:王國已走火入魔,與最終魔王背後的黑暗力量有勾結。

5. 雲上天界 Celestial Realm
   王國自稱受「聖光」加持的最終防線,天使死後化聖光治癒同伴(呼應機制)。
   真相揭露:所謂聖光其實來自更高層的存在(第六天魔神王下放的力量),
   王國只是棋子。

--------------------------------------------------------------------------------
二、每 20 關|地帶魔王(五位,各地帶第一輪的第20關)
--------------------------------------------------------------------------------

① 草原|王國大元帥

③ 雪原|冰甲護國公

④ 魔域|叛骨死士長

⑤ 天界|聖騎主教

--------------------------------------------------------------------------------
三、每 100 關|主神(輪迴節點,同一位主神一次比一次更強的化身)
--------------------------------------------------------------------------------
代表王國背後那股力量(第六天魔神王)每 100 關親自投下一道「分神」鎮壓
史萊姆,失敗一次就撤回,下個輪迴再更強地降臨。
出場動畫:天空整個變色,五個地帶的元素同時在牠身上顯現一瞬,

--------------------------------------------------------------------------------
四、第 1000 關|第六天魔神王(最終決戰)
--------------------------------------------------------------------------------
已征服全部五個世界,戰場設定在「雲海之上」。
出場動畫呼應牠循環五種地帶之相的機制:
雲海翻湧,五個地帶的顏色與元素依序在牠身周閃過一輪

【打擊感 Game Feel】
- Screen shake:依傷害大小給不同強度/方向的畫面震動
- Hit-stop:命中瞬間畫面凍結 1-2 禎再繼續,強化打擊感
- 傷害數字飄字:一般命中彈跳飄出;爆擊時字體加大、變色、彈跳曲線更誇張
- 史萊姆 Squash & Stretch:蓄力時被拉長,命中瞬間被壓扁

【環境細節】
- 背景視差捲動(parallax):遠景慢移、近景快移,提升立體感
- 各地帶氛圍粒子:草原飄花瓣、沙漠揚沙、雪原飄雪、火山飄灰燼、
  天界飄羽毛光點(雪原/火山現有雛形可擴大到全地帶)
- 魔王戰濾鏡切換:色調變暗 + 邊緣暈影,呼應 BGM 的「黑化變奏」

【UI / 回饋層】

- 過關結算畫面:金幣/分數逐項數字滾動顯示,而非瞬間跳出
- 地帶/世界切換轉場動畫:加入掃光效或翻頁效果,取代純文字提示

【音效層次】
- 動態混音:史萊姆血量低時 BGM 自動加濾波器變悶,製造緊張感
- 連擊/爆擊疊加短促音效層,而非單一觸發音效
